<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
/* CORE AERO STYLING */
* { margin: 0; padding: 0; box-sizing: border-box; }
body { width: 100vw; height: 100vh; overflow: hidden; font-family: "Segoe UI", Tahoma, sans-serif; background: url("./wallpaper.jpg") no-repeat center center fixed; background-size: cover; }

.desktop { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 20px; z-index: 5; }
.icon { width: 80px; text-align: center; color: white; font-size: 12px; text-shadow: 1px 1px 2px black; cursor: pointer; }
.icon img { width: 48px; height: 48px; display: block; margin: 0 auto 5px; }

/* Window UI */
.window { position: absolute; width: 760px; height: 480px; display: flex; flex-direction: column; border-radius: 10px; background: rgba(235,240,255,0.18); border: 1px solid rgba(255,255,255,0.35); backdrop-filter: blur(40px) saturate(200%); -webkit-backdrop-filter: blur(40px) saturate(200%); box-shadow: 0 60px 140px rgba(0,0,0,0.75); overflow: hidden; }
.title-bar { height: 38px; display: flex; justify-content: space-between; align-items: center; padding: 0 8px; background: linear-gradient(to bottom, rgba(255,255,255,0.75), rgba(255,255,255,0.25)); cursor: grab; user-select: none; }
.title-bar span { color: white; font-size: 13px; font-weight: 600; text-shadow: 0 2px 8px black; }
.controls { display: flex; gap: 4px; }
.winbtn { width: 34px; height: 22px; display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: bold; border-radius: 3px; cursor: pointer; border: 1px solid rgba(0,0,0,0.3); }
.winbtn.min { background: linear-gradient(to bottom, #fff, #cfd8ff); }
.winbtn.max { background: linear-gradient(to bottom, #fff, #d0ffd6); }
.winbtn.close { width: 46px; color: white; background: linear-gradient(to bottom, #ff6a6a, #b30000); }

.content { flex: 1; padding: 30px; color: white; text-shadow: 0 2px 10px black; overflow-y: auto; }

/* FULLSCREEN READER */
#blog-reader {
    position: fixed;
    top: 0; left: 0;
    width: 100vw; height: 100vh;
    background: rgba(0,0,0,0.98);
    backdrop-filter: blur(25px);
    z-index: 9999;
    display: none; 
    flex-direction: column;
    color: white;
}
.reader-header { padding: 15px 25px; background: rgba(255,255,255,0.05); display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid rgba(255,255,255,0.1); }
.reader-body { 
    flex: 1; 
    padding: 60px 20%; 
    overflow-y: auto; 
    scroll-behavior: smooth;
}
#reader-post-content { 
    font-size: 1.3em; 
    line-height: 1.7; 
    white-space: pre-wrap; /* Respects line breaks */
}

/* BACK TO TOP BUTTON */
#backToTop {
    position: fixed;
    bottom: 30px;
    right: 30px;
    background: rgba(120,170,255,0.6);
    color: white;
    border: 1px solid rgba(255,255,255,0.3);
    padding: 10px 15px;
    border-radius: 5px;
    cursor: pointer;
    display: none;
    font-size: 12px;
}

#taskbar { position: absolute; bottom: 0; left: 0; width: 100%; height: 40px; display: flex; align-items: center; padding: 5px; background: rgba(0,0,0,0.65); z-index: 10000; }
.taskbtn { padding: 6px 12px; margin-right: 6px; font-size: 12px; color: white; background: rgba(255,255,255,0.15); border-radius: 3px; cursor: pointer; }
</style>
</head>

<body>

<div class="desktop">
    <div class="icon" onclick="launch('Home')"><img src="./home.png">Home</div>
    <div class="icon" onclick="launch('About')"><img src="./aboutme.png">About</div>
    <div class="icon" onclick="launch('Downloads')"><img src="./downloads.png">Downloads</div>
    <div class="icon" onclick="launch('Videos')"><img src="./videos.png">Videos</div>
    <div class="icon" onclick="launch('Blog')"><img src="./pic.png">Blog</div>
</div>

<div id="blog-reader">
    <div class="reader-header">
        <span style="font-weight: bold; letter-spacing: 1px;">BRAYDENPEACOCKTECH BLOG</span>
        <div class="winbtn close" style="height: 30px; width: 80px;" onclick="closeReader()">✕ Close</div>
    </div>
    <div class="reader-body" id="readerBody">
        <h1 id="reader-post-title" style="font-size: 3.5em; margin-bottom: 10px; color: #78aaff;"></h1>
        <span id="reader-post-author" style="color: #888; font-style: italic; margin-bottom: 40px; display: block; font-size: 1.2em;"></span>
        <div id="reader-post-content"></div>
        <div id="backToTop" onclick="scrollToTop()">↑ Back to Top</div>
    </div>
</div>

<div id="taskbar"></div>

<script>
let z = 10;
let windows = {};
let tasks = {};
let booted = false;

// UPDATED BLOG DATA WITH YOUR 5 CHANGES
const myBlogs = [
    {
        title: "Is Microsoft finally doing things right",
        author: "Brayden Peacock",
        preview: "Microsoft has released Windows 11 build 26300.2289 on 4/26/26. Let's talk about it...",
        fullText: "Microsoft has released Windows 11 build 26300.2289 on 4/26/26. Let's talk about it.\n\n1st Change: Microsoft has added the new spinny animation from Windows 10x and 11 into even more places.\n\n2nd Change: Microsoft has said that the taskbar will be more flexible now being able to go to the top, left, and right. About time!\n\n3rd Change: Microsoft said they would let users skip Windows Update in OOBE.\n\n4th Change: Microsoft has updated Run. To get the new run, go to Settings > System > Advanced and enable 'Modern Run'.\n\n5th and Final: In Windows Update, Dev and Canary were merged into the Experimental Channel.\n\nThanks for reading this blog and have a great day."
    }
];

function openReader(index) {
    const post = myBlogs[index];
    document.getElementById('reader-post-title').innerText = post.title;
    document.getElementById('reader-post-author').innerText = "By " + post.author;
    document.getElementById('reader-post-content').innerText = post.fullText;
    document.getElementById('blog-reader').style.display = 'flex';
}

function closeReader() { document.getElementById('blog-reader').style.display = 'none'; }

function scrollToTop() {
    document.getElementById('readerBody').scrollTo({ top: 0, behavior: 'smooth' });
}

// Show/Hide Back to Top button
document.getElementById('readerBody').onscroll = function() {
    let btn = document.getElementById("backToTop");
    if (this.scrollTop > 300) { btn.style.display = "block"; } 
    else { btn.style.display = "none"; }
};

function getContent(app) {
    if (app === "Blog") {
        let listHtml = "<h1>Latest Posts</h1>";
        myBlogs.forEach((post, index) => {
            listHtml += `<div onclick="openReader(${index})" style="cursor:pointer; background:rgba(255,255,255,0.1); padding:15px; border-radius:8px; margin-top:10px;"><h2>${post.title}</h2><p>${post.preview}</p></div>`;
        });
        return listHtml;
    }
    switch(app) {
        case "Home": return "Welcome to BraydenPeacockTech.";
        case "About": return "Hi, I'm Brayden Peacock. YouTuber and tech enthusiast.";
        case "Downloads": return "Downloads coming soon.";
        case "Videos": return "Videos coming soon.";
        default: return "";
    }
}

const bootSound = new Audio("./Start.mp3");
function launch(app) {
    const id = "win_" + app;
    if (windows[id]) { windows[id].style.display = "flex"; windows[id].style.zIndex = ++z; return; }
    const win = document.createElement("div");
    win.className = "window";
    win.style.top = "100px"; win.style.left = "100px"; win.style.zIndex = ++z;
    win.innerHTML = `<div class="title-bar"><span>${app} - BraydenPeacockTech</span><div class="controls"><div class="winbtn min" onclick="minimize('${id}')">—</div><div class="winbtn max" onclick="maximize('${id}')">□</div><div class="winbtn close" onclick="closeWin('${id}')">✕</div></div></div><div class="content"><div>${getContent(app)}</div></div>`;
    document.body.appendChild(win);
    windows[id] = win;
    addTask(id, app);
}

function addTask(id, app) {
    const bar = document.getElementById("taskbar");
    const btn = document.createElement("div");
    btn.className = "taskbtn"; btn.innerText = app;
    btn.onclick = () => { if (windows[id]) { windows[id].style.display = "flex"; windows[id].style.zIndex = ++z; } };
    bar.appendChild(btn); tasks[id] = btn;
}

function closeWin(id) { if (windows[id]) windows[id].remove(); if (tasks[id]) tasks[id].remove(); delete windows[id]; delete tasks[id]; }
function minimize(id) { if (windows[id]) windows[id].style.display = "none"; }
function maximize(id) {
    const w = windows[id]; if (!w) return;
    if (!w.dataset.max) { w.dataset.max = "1"; w.style.top = "0"; w.style.left = "0"; w.style.width = "100vw"; w.style.height = "calc(100vh - 40px)"; }
    else { w.dataset.max = ""; w.style.width = "760px"; w.style.height = "480px"; w.style.top = "120px"; w.style.left = "120px"; }
}

let dragTarget = null; let offsetX = 0; let offsetY = 0;
document.addEventListener("mousedown", (e) => { const bar = e.target.closest(".title-bar"); if (!bar) return; dragTarget = bar.parentElement; offsetX = e.clientX - dragTarget.offsetLeft; offsetY = e.clientY - dragTarget.offsetTop; dragTarget.style.zIndex = ++z; });
document.addEventListener("mousemove", (e) => { if (!dragTarget) return; dragTarget.style.left = (e.clientX - offsetX) + "px"; dragTarget.style.top = (e.clientY - offsetY) + "px"; });
document.addEventListener("mouseup", () => { dragTarget = null; });

document.addEventListener("pointerdown", () => {
    if (booted) return;
    booted = true;
    bootSound.play().catch(() => {});
    launch("Home"); 
}, { once: true });
</script>
</body>
</html>
