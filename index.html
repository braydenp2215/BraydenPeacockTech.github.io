<!DOCTYPE html>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",Tahoma;
    background:url("./wallpaper.jpg") center/cover no-repeat fixed;
}

/* DESKTOP */
.desktop{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:2;
}

.icon{
    width:90px;
    text-align:center;
    color:white;
    cursor:pointer;
    text-shadow:0 2px 6px black;
}

.icon img{
    width:48px;
    height:48px;
    display:block;
    margin:0 auto 5px;
}

/* VISTA AERO */
.window{
    position:absolute;
    width:900px;
    height:560px;

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.12)
    );

    backdrop-filter:blur(70px) saturate(240%);
    border:1px solid rgba(255,255,255,0.55);
    border-radius:14px;

    overflow:hidden;
    box-shadow:0 80px 180px rgba(0,0,0,0.85);
}

/* TITLE BAR */
.title-bar{
    height:38px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.9),
        rgba(255,255,255,0.3)
    );

    cursor:grab;
    user-select:none;
}

.title-bar span{
    color:white;
    font-weight:600;
    text-shadow:0 2px 8px black;
}

/* BUTTONS (RESTORED STYLE) */
.controls{display:flex;gap:4px;}

.winbtn{
    width:28px;
    height:19px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:12px;
    font-weight:bold;

    border-radius:2px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.75),
        rgba(200,200,200,0.25)
    );

    border:1px solid rgba(0,0,0,0.3);
    cursor:pointer;
    color:black;
}

.winbtn:hover{
    background:linear-gradient(to bottom,
        rgba(255,255,255,0.95),
        rgba(220,220,220,0.4)
    );
}

.winbtn.max{font-size:10px;}

.winbtn.close{
    width:46px;
    color:white;
    background:linear-gradient(to bottom,#ff6a6a,#b30000);
}

/* CONTENT */
.content{
    padding:20px;
    color:white;
    height:calc(100% - 38px);
    overflow:auto;
    text-shadow:0 2px 10px black;
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
    padding:5px;
}

.taskbtn{
    color:white;
    margin-right:5px;
    padding:5px 10px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;
    border-radius:3px;
}

/* BLOG PREVIEW */
.blog-box{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:10px;
}

/* FULLSCREEN BLOG */
#reader{
    position:fixed;
    top:0;left:0;
    width:100vw;height:100vh;
    background:rgba(0,0,0,0.95);
    display:none;
    flex-direction:column;
    z-index:9999;
    color:white;
    overflow:auto;
}

#reader .top{
    padding:15px;
    display:flex;
    justify-content:space-between;
    background:rgba(255,255,255,0.05);
}

/* ROVER */
#rover{
    position:absolute;
    bottom:60px;
    right:30px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:10px;
    z-index:3;
}

#bubble{
    background:white;
    color:black;
    padding:12px;
    border-radius:15px;
    width:280px;
}

#rover img{
    width:200px;
}

#search-box{
    display:flex;
    gap:5px;
}

#search-box input{
    padding:6px;
    border-radius:5px;
    border:none;
}

#search-box button{
    padding:6px 10px;
    background:#4da3ff;
    color:white;
    border:none;
    cursor:pointer;
    border-radius:5px;
}

function openApp(name){

if(win[name]){
    win[name].style.display="block";
    return;

let w=document.createElement("div");
w.className="window";
w.style.top="100px";
w.style.left="120px";

w.innerHTML=`
<div class="title-bar">
<span>${name}</span>
<div class="controls">
<div class="winbtn" onclick="min(this)">_</div>
<div class="winbtn max" onclick="max(this)">□</div>
<div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
</div>
</div>
<div class="content">${getContent(name)}</div>
`;

document.body.appendChild(w);
win[name]=w;
}

/* MIN/MAX */
function min(b){b.closest(".window").style.display="none";}

function max(b){
let w=b.closest(".window");
if(w.style.width==="100vw"){
w.style.width="900px";w.style.height="560px";

w.style.width="100vw";w.style.height="calc(100vh - 40px)";

/* ROVER SEARCH */
function search(){
let q=document.getElementById("search").value.toLowerCase();
let b=document.getElementById("bubble");
let img=document.querySelector("#rover img");

img.src="./finding.gif";
b.innerText="Sniffing...";

img.src="./search.png";

if(q.includes("home"))openApp("Home");
else if(q.includes("about"))openApp("About");
else if(q.includes("video"))openApp("Videos");
else if(q.includes("blog"))openApp("Blog");
else if(q.includes("download"))openApp("Downloads");
else b.innerText="Couldn't find it";

},10000);
}

/* DRAG */
let d=null,ox=0,oy=0;

document.addEventListener("mousedown",e=>{
let bar=e.target.closest(".title-bar");
if(!bar)return;
d=bar.parentElement;
ox=e.clientX-d.offsetLeft;
oy=e.clientY-d.offsetTop;
});

document.addEventListener("mousemove",e=>{
if(!d)return;
d.style.left=(e.clientX-ox)+"px";
d.style.top=(e.clientY-oy)+"px";
});

document.addEventListener("mouseup",()=>d=null);
