<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",Tahoma;
    background:url("./wallpaper.jpg") center/cover no-repeat fixed;
}

/* 🖥 DESKTOP */
.desktop{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:18px;
    z-index:10;
}

.icon{
    width:90px;
    text-align:center;
    color:white;
    cursor:pointer;
    text-shadow:0 2px 6px black;
}

.icon img{
    width:48px;
    height:48px;
    display:block;
    margin:0 auto 5px;
}

/* 🪟 VISTA AERO WINDOW */
.window{
    position:absolute;
    width:900px;
    height:560px;

    background:linear-gradient(
        to bottom,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.12)
    );

    backdrop-filter:blur(70px) saturate(200%);

    border:1px solid rgba(255,255,255,0.5);
    border-radius:14px;

    overflow:hidden;
    box-shadow:0 80px 180px rgba(0,0,0,0.8);
    z-index:20;
}

/* TITLE BAR */
.title-bar{
    height:38px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.9),
        rgba(255,255,255,0.3));

    cursor:grab;
    user-select:none;
}

.title-bar span{
    color:white;
    font-weight:600;
    text-shadow:0 2px 8px black;
}

/* BUTTONS (RESTORED VISTA STYLE) */
.controls{
    display:flex;
    gap:4px;
}

.winbtn{
    width:28px;
    height:19px;

    display:flex;
    align-items:center;
    justify-content:center;

    font-size:12px;
    font-weight:bold;

    border-radius:2px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.85),
        rgba(200,200,200,0.25));

    border:1px solid rgba(0,0,0,0.3);
    cursor:pointer;
    color:black;
}

.winbtn:hover{
    background:linear-gradient(to bottom,white,rgba(220,220,220,0.5));
}

.winbtn.close{
    width:46px;
    color:white;
    background:linear-gradient(to bottom,#ff6a6a,#b30000);
}

/* CONTENT */
.content{
    padding:20px;
    color:white;
    height:calc(100% - 38px);
    overflow:auto;
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
    padding:5px;
    z-index:30;
}

.taskbtn{
    color:white;
    margin-right:5px;
    padding:5px 10px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;
    border-radius:3px;
}

/* BLOG */
.blog-box{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:10px;
}

/* ROVER */
#rover-container{
    position:absolute;
    bottom:60px;
    right:30px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:10px;
    z-index:50;
}

#rover-bubble{
    background:white;
    color:black;
    padding:12px 16px;
    border-radius:15px;
    width:280px;
}

#rover-img{
    width:200px;
}

/* VIDEO */
.video-card{
    background:rgba(255,255,255,0.12);
    padding:12px;
    border-radius:10px;
    margin-bottom:12px;
}
</style>
</head>

<body>

<audio id="startupSound" src="./vista-startup.mp3"></audio>

<!-- DESKTOP ICONS -->
<div class="desktop">
<div class="icon" onclick="openApp('Home')"><img src="./home.png">Home</div>
<div class="icon" onclick="openApp('About')"><img src="./aboutme.png">About</div>
<div class="icon" onclick="openApp('Videos')"><img src="./videos.png">Videos</div>
<div class="icon" onclick="openApp('Blog')"><img src="./pic.png">Blog</div>
<div class="icon" onclick="openApp('Downloads')"><img src="./downloads.png">Downloads</div>
</div>

<div id="taskbar"></div>

<!-- ROVER -->
<div id="rover-container">
<div id="rover-bubble">Woof! I'm Rover. Type what you're looking for!</div>
<img id="rover-img" src="./search.png">
<input id="search">
<button onclick="searchSite()">Search</button>
</div>

<script>

let z=10;
let windows={};
let maximized={};
let soundPlayed=false;

/* START SOUND */
document.addEventListener("pointerdown",()=>{
if(soundPlayed) return;
soundPlayed=true;
document.getElementById("startupSound").play().catch(()=>{});
});

/* OPEN WINDOW */
function openApp(name){

if(windows[name]){
windows[name].style.display="block";
windows[name].style.zIndex=++z;
return;
}

let win=document.createElement("div");
win.className="window";
win.style.top="120px";
win.style.left="120px";
win.style.zIndex=++z;

win.innerHTML=`
<div class="title-bar">
<span>${name}</span>
<div class="controls">
<div class="winbtn" onclick="minimize(this)">_</div>
<div class="winbtn" onclick="maximize(this)">□</div>
<div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
</div>
</div>
<div class="content">${getContent(name)}</div>
`;

document.body.appendChild(win);
windows[name]=win;
}

/* MINIMIZE */
function minimize(b){
b.closest(".window").style.display="none";
}

/* MAXIMIZE */
function maximize(b){
let w=b.closest(".window");

if(!maximized[w]){
maximized[w]=true;
w.dataset.old=JSON.stringify({
top:w.style.top,
left:w.style.left,
width:w.style.width,
height:w.style.height
});

w.style.top="0";
w.style.left="0";
w.style.width="100vw";
w.style.height="calc(100vh - 40px)";
}else{
let o=JSON.parse(w.dataset.old);
w.style.top=o.top;
w.style.left=o.left;
w.style.width=o.width;
w.style.height=o.height;
delete maximized[w];
}
}

/* CONTENT */
function getContent(name){

/* 🎥 FULL VIDEO LIST (ALL YOUR TITLES) */
if(name==="Videos"){

const videos=[
{title:"Windows Vista dies part 1",id:"YhPE3z1WeVA"},
{title:"Upgrading through every version of Windows Part 1",id:"t684MtGv31Y"},
{title:"Installing and Exploring Windows 8 8032",id:"rkuYDSrxreA"},
{title:"The Evolution of Windows",id:"49OH_v64Fpg"},
{title:"New BetaTester Intro",id:"XR2AoWhmjMk"},
{title:"Upgrading to Windows 10 like its 2016",id:"ugu-VQdo-8I"},
{title:"Exploring Windows 11 Build 29531.1000",id:"Psd7wpNbGRQ"},
{title:"My PC and a weird video",id:"vFLD3-0Cs4E"},
{title:"Installing and Exploring Windows 10 10074",id:"CNeIqVY3niM"},
{title:"Upgrading through almost every version of Windows Part 2",id:"b5A4vUXMPpg"},
{title:"System",id:"mEoJBW3VvGQ"},
{title:"Destroying Windows 11 with viruses Part 1",id:"TPMCbeakcgs"},
{title:"New intro",id:"a-tv_q2lv1s"},
{title:"This is not Windows 7",id:"m5bjih7dLGY"},
{title:"What to do now that Windows 10 is dead + demoing Windows 10",id:"-TyfeKDRDJ8"},
{title:"Upgrading from Windows 98 to XP",id:"YZYM4031WoI"},
{title:"Comparing Internet Explorer to Netscape",id:"wiHjFtQ-300"},
{title:"Unboxing a capture card and USB",id:"bo6f98TRnuE"},
{title:"Checking out Super11 ISO",id:"Ein11cKmK_M"},
{title:"Installing Windows XP in 2024!",id:"FXk4J_g1IqU"}
];

let html="<h1>Videos</h1>";

videos.forEach(v=>{
html+=`
<div class="video-card">
<h3>${v.title}</h3>
<iframe width="100%" height="260"
src="https://www.youtube.com/embed/${v.id}"
allowfullscreen></iframe>
</div>`;
});

return html;
}

/* BLOG */
if(name==="Blog"){
return `
<h1>Blog</h1>
<div class="blog-box">
Microsoft released Windows 11 build 26300.2289 on 4/26/26.<br><br>
<button onclick="this.parentElement.innerHTML+=' <br><br>Extra changes include taskbar movement, modern Run, and update channel merge.'">
Keep Reading
</button>
</div>`;
}

if(name==="Home") return "<h1>Welcome</h1>";
if(name==="About") return "<h2>Brayden Peacock</h2>";
if(name==="Downloads") return "<h1>Downloads</h1>";

return "Coming soon...";
}

/* ROVER SEARCH */
function searchSite(){

let q=document.getElementById("search").value.toLowerCase();
let b=document.getElementById("rover-bubble");
let img=document.getElementById("rover-img");

if(!q) return;

img.src="./finding.gif";
b.innerText="Searching...";

setTimeout(()=>{

img.src="./search.png";

if(q.includes("video")) openApp("Videos");
else if(q.includes("blog")) openApp("Blog");
else if(q.includes("home")) openApp("Home");
else b.innerText="Woof... not found";

},10000);
}

/* DRAG */
let drag=null,ox=0,oy=0;

document.addEventListener("mousedown",(e)=>{
let bar=e.target.closest(".title-bar");
if(!bar) return;
drag=bar.parentElement;
ox=e.clientX-drag.offsetLeft;
oy=e.clientY-drag.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(!drag) return;
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
});

document.addEventListener("mouseup",()=>drag=null);

</script>

</body>
</html>
