<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BraydenPeacockTech - Build 4032u</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #004578 url('wallpaper.jpg') no-repeat center center fixed;
            background-size: cover;
        }

        #taskbar {
            position: fixed; bottom: 0; width: 100%; height: 40px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px); border-top: 1px solid rgba(255,255,255,0.3);
            display: flex; align-items: center; padding: 0 10px; z-index: 10000;
        }
        .task-item {
            background: rgba(255,255,255,0.2); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 5px 15px; border-radius: 3px; cursor: pointer; font-size: 12px;
            display: flex; align-items: center; gap: 8px;
        }

        #window {
            position: absolute; top: 30px; left: 50px;
            width: 1100px; height: 820px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px; box-shadow: 0 25px 60px rgba(0,0,0,0.6);
            display: flex; flex-direction: column;
            backdrop-filter: blur(25px) saturate(150%);
            z-index: 100;
        }

        .title-bar { 
            height: 38px; cursor: move; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 12px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
        }
        .title-text { color: white; font-size: 13px; text-shadow: 0 1px 2px black; pointer-events: none; }

        .win-btn { width: 45px; height: 22px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; }
        .close-btn:hover { background: #e81123; }

        .main-view { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar { width: 120px; background: rgba(0,0,0,0.2); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; padding-top: 15px; }
        .nav-item { margin-bottom: 20px; color: white; cursor: pointer; text-align: center; width: 100%; padding: 10px 0; }
        .nav-icon { width: 38px; height: 38px; display: block; margin: 0 auto 5px; }
        .nav-label { font-size: 10px; text-shadow: 0 1px 2px black; }

        .content-area { flex: 1; padding: 20px; color: white; overflow-y: auto; background: rgba(0,0,0,0.1); }

        /* Integrated Video Player */
        #wmp-player { 
            width: 100%; height: 450px; 
            background: #000; display: none; flex-direction: column; 
            border: 1px solid #444; border-radius: 4px; margin-bottom: 20px;
        }
        .wmp-header { 
            height: 30px; background: linear-gradient(to bottom, #4a4a4a, #222); 
            display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid #111;
        }
        .wmp-controls { 
            height: 60px; background: linear-gradient(to bottom, #333, #111); 
            display: flex; align-items: center; justify-content: center; gap: 20px;
            border-top: 1px solid #444;
        }
        .wmp-btn {
            width: 35px; height: 35px; border-radius: 50%; border: 1px solid #555;
            background: radial-gradient(circle, #666, #222); color: white;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; margin-top: 20px; }
        .video-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 6px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .video-card:hover { border-color: #00adef; transform: translateY(-3px); background: rgba(0,0,0,0.6); }

        .hidden { display: none !important; }
        .search-container { display: flex; align-items: center; background: rgba(0,0,0,0.5); border: 1px solid #555; padding: 8px 12px; border-radius: 4px; margin-bottom: 15px; }
    </style>

                        </div>
                        <div style="flex: 1; background: #000;">
                            <iframe id="p-frame" width="100%" height="100%" frameborder="0" allow="autoplay; fullscreen"></iframe>

                        <div class="wmp-controls">
                            <div class="wmp-btn" onclick="stopVideo()">■</div>

                    <div class="search-container">

                    </div>

                    <div class="video-grid" id="v-grid"></div>

        function init() {
            document.addEventListener('click', () => { document.getElementById('startup').play().catch(()=>{}); }, {once: true});
            const grid = document.getElementById('v-grid');
            vData.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => play(v.id, v.t);
                card.innerHTML = `<img src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg" style="width:100%;"><p style="font-size:11px; margin-top:5px;">${v.t}</p>`;
                grid.appendChild(card);
            });
            dragElement(document.getElementById("window"));
        }

        function play(id, title) {
            document.getElementById('wmp-player').style.display = 'flex';
            document.getElementById('p-frame').src = `https://www.youtube.com/embed/${id}?autoplay=1`;
            document.getElementById('p-title').innerText = title;
            document.getElementById('view-videos').scrollTo({ top: 0, behavior: 'smooth' });
        }

        function stopVideo() {
            document.getElementById('wmp-player').style.display = 'none';
            document.getElementById('p-frame').src = "";
        }

        function showPage(id) {
            ['home', 'videos', 'blog', 'downloads', 'about'].forEach(p => {
                const el = document.getElementById('view-'+p);
                if(el) el.classList.add('hidden');
            });
            document.getElementById('view-'+id).classList.remove('hidden');
        }

        function searchVids() {
            const q = document.getElementById('vSearch').value.toLowerCase();
            document.querySelectorAll('.video-card').forEach(c => c.style.display = c.innerText.toLowerCase().includes(q) ? 'block' : 'none');
        }

        function minimizeWin() { document.getElementById('window').style.display = 'none'; }
        function restoreWin() { document.getElementById('window').style.display = 'flex'; }
        function closeWin() { document.getElementById('window').style.display = 'none'; }

        function dragElement(elmnt) {
            var pos1 = 0, pos2 = 0, pos3 = 0, pos4 = 0;
            document.getElementById(elmnt.id + "Header").onmousedown = function(e) {
                e.preventDefault(); pos3 = e.clientX; pos4 = e.clientY;
                document.onmouseup = function() { document.onmouseup = null; document.onmousemove = null; };
                document.onmousemove = function(e) {
                    e.preventDefault(); pos1 = pos3 - e.clientX; pos2 = pos4 - e.clientY;
                    pos3 = e.clientX; pos4 = e.clientY;
                    elmnt.style.top = (elmnt.offsetTop - pos2) + "px";
                    elmnt.style.left = (elmnt.offsetLeft - pos1) + "px";
                };
            };
        }
