<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BraydenPeacockTech - Build 4032z</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #004578 url('wallpaper.jpg') no-repeat center center fixed;
            background-size: cover;
            user-select: none;
        }

        #window {
            position: absolute; top: 20px; left: 30px;
            width: 1200px; height: 900px;
            background: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 12px; box-shadow: 0 25px 60px rgba(0,0,0,0.5);
            display: flex; flex-direction: column;
            backdrop-filter: blur(35px) saturate(180%);
            -webkit-backdrop-filter: blur(35px) saturate(180%);
            z-index: 100;
            overflow: hidden;
            transition: width 0.3s, height 0.3s, top 0.3s, left 0.3s, opacity 0.3s;
        }

        .title-bar { 
            height: 45px; display: flex; 
            justify-content: space-between; align-items: center; padding: 0 10px 0 20px;
            background: rgba(255, 255, 255, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            cursor: move;
        }
        .title-text { color: white; font-size: 14px; text-shadow: 0 1px 2px rgba(0,0,0,0.5); pointer-events: none; }

        .window-controls { display: flex; gap: 2px; align-items: flex-start; height: 100%; }

        .aero-btn {
            background: linear-gradient(180deg, rgba(255,255,255,0.3) 0%, rgba(255,255,255,0.1) 50%, rgba(255,255,255,0.05) 51%, rgba(255,255,255,0.2) 100%);
            border: 1px solid rgba(255,255,255,0.4);
            border-top: none; border-radius: 0 0 4px 4px; 
            color: white; padding: 5px 15px;
            cursor: pointer; font-size: 13px; transition: 0.2s;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.3);
        }
        .aero-btn:hover { background: rgba(255,255,255,0.4); border-color: white; }

        .btn-close {
            padding: 5px 28px !important;
            background: linear-gradient(180deg, rgba(232, 17, 35, 0.6) 0%, rgba(180, 20, 30, 0.8) 100%) !important;
            font-weight: bold;
        }
        .btn-close:hover {
            background: rgba(232, 17, 35, 0.9) !important;
            box-shadow: 0 0 20px rgba(232, 17, 35, 0.9), inset 0 1px 0 rgba(255,255,255,0.4) !important;
            border-color: #ff8080 !important;
        }

        .main-view { display: flex; flex: 1; overflow: hidden; position: relative; }
        .sidebar { width: 100px; background: rgba(0,0,0,0.3); border-right: 1px solid rgba(255,255,255,0.1); display: flex; flex-direction: column; align-items: center; padding-top: 20px; gap: 15px; }
        .nav-item { width: 80px; padding: 10px 0; border-radius: 8px; display: flex; flex-direction: column; align-items: center; cursor: pointer; transition: 0.2s; }
        .nav-item:hover { background: rgba(255, 255, 255, 0.1); }
        .nav-item.active { background: rgba(255, 255, 255, 0.15); border: 1px solid rgba(255,255,255,0.2); }
        .nav-icon { width: 42px; height: 42px; margin-bottom: 5px; }
        .nav-label { color: white; font-size: 11px; text-shadow: 0 1px 2px black; text-align: center; }

        .content-area { flex: 1; position: relative; overflow: hidden; padding: 30px; color: white; }
        .tab-content { display: none; width: 100%; height: 100%; flex-direction: column; overflow-y: auto; }
        .tab-content.active { display: flex; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; padding-bottom: 50px; }
        .video-card { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; }
        .video-card:hover { background: rgba(255,255,255,0.15); transform: translateY(-3px); }
        .video-card p { font-size: 12px; margin-top: 8px; height: 2.4em; overflow: hidden; }

        .blog-post { background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 12px; line-height: 1.6; }
        .blog-post h2 { margin-bottom: 15px; color: #00bcff; }
        #blog-more { display: none; margin-top: 15px; }
