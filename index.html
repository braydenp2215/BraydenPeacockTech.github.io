<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Segoe UI", Tahoma, sans-serif;

  /* 🌄 Vista-style background */
  background: url("https://upload.wikimedia.org/wikipedia/en/7/76/Windows_Vista_wallpaper.jpg");
  background-size: cover;
  background-position: center;

  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== WINDOW ===== */
.window {
  width: 420px;
  border-radius: 12px;
  overflow: hidden;

  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.3);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  color: white;
}

/* ===== TITLE BAR (VISTA STYLE) ===== */
.titlebar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 8px 10px 8px 14px;

  background: linear-gradient(
    to bottom,
    rgba(120,180,255,0.9),
    rgba(30,90,180,0.9)
  );

  border-bottom: 1px solid rgba(255,255,255,0.3);

  font-size: 14px;
  font-weight: 600;
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

/* ===== WINDOWS BUTTONS ===== */
.controls {
  display: flex;
  gap: 6px;
}

.win-btn {
  width: 18px;
  height: 18px;
  border-radius: 3px;
  background: rgba(255,255,255,0.25);
  border: 1px solid rgba(255,255,255,0.4);
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  font-size: 12px;
  color: white;
  user-select: none;
}

.win-btn:hover {
  background: rgba(255,255,255,0.4);
}

/* ===== CONTENT ===== */
.content {
  padding: 25px;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 26px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

p {
  opacity: 0.9;
  margin-top: 10px;
}

.small {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="window" id="window">

  <div class="titlebar">
    <div>Welcome to my website</div>

    <div class="controls">
      <div class="win-btn" onclick="minimize()">_</div>
      <div class="win-btn" onclick="maximize()">□</div>
      <div class="win-btn" onclick="closeWindow()">X</div>
    </div>
  </div>

  <div class="content">
    <h1>BraydenPeacockTech</h1>
    <p>Vista-style tech site</p>
    <div class="small">Built with GitHub Pages</div>
  </div>

</div>

<script>
function minimize() {
  document.querySelector(".content").style.display = "none";
}

function maximize() {
  const w = document.getElementById("window");
  if (w.style.width === "100%") {
    w.style.width = "420px";
  } else {
    w.style.width = "100%";
    w.style.height = "100vh";
  }
}

function closeWindow() {
  document.getElementById("window").style.display = "none";
}
</script>

</body>
</html>
