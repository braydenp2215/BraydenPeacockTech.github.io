<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",Tahoma;
    background:url("./wallpaper.jpg") center/cover no-repeat fixed;
}

/* DESKTOP */
.desktop{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
}

.icon{
    width:90px;
    text-align:center;
    color:white;
    cursor:pointer;
}

.icon img{
    width:48px;
    display:block;
    margin:0 auto 5px;
}

/* WINDOW */
.window{
    position:absolute;
    width:850px;
    height:540px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(40px);
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.8);
}

/* TITLE BAR */
.title-bar{
    height:38px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    background:linear-gradient(to bottom,rgba(255,255,255,0.9),rgba(255,255,255,0.2));
    cursor:grab;
}

.controls{display:flex;gap:4px;}

.winbtn{
    width:28px;height:19px;
    display:flex;align-items:center;justify-content:center;
    font-size:12px;font-weight:bold;
    border-radius:2px;
    background:linear-gradient(to bottom,rgba(255,255,255,0.75),rgba(200,200,200,0.25));
    border:1px solid rgba(0,0,0,0.3);
    cursor:pointer;
}

.winbtn.close{
    width:46px;
    color:white;
    background:linear-gradient(to bottom,#ff6a6a,#b30000);
}

/* CONTENT */
.content{
    padding:15px;
    height:calc(100% - 38px);
    overflow:auto;
    color:white;
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,0,0,0.7);
}

/* ROVER */
#rover{
    position:absolute;
    bottom:60px;
    right:20px;
    width:200px;
}

/* VIDEO */
.video{
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="desktop">
<div class="icon" onclick="openApp('Home')"><img src="home.png">Home</div>
<div class="icon" onclick="openApp('Videos')"><img src="videos.png">Videos</div>
<div class="icon" onclick="openApp('Blog')"><img src="pic.png">Blog</div>
</div>

<img id="rover" src="search.png">

<audio id="startup" src="vista-startup.mp3"></audio>

<div id="taskbar"></div>

<script>
let windows={};
let z=5;

/* START SOUND */
document.addEventListener("click",()=>{
document.getElementById("startup").play();
},{once:true});

/* OPEN WINDOW */
function openApp(name){

if(windows[name]){
windows[name].style.display="block";
return;
}

let win=document.createElement("div");
win.className="window";
win.style.top="100px";
win.style.left="100px";
win.style.zIndex=++z;

win.innerHTML=`
<div class="title-bar">
<span>${name}</span>
<div class="controls">
<div class="winbtn" onclick="this.closest('.window').style.display='none'">_</div>
<div class="winbtn" onclick="this.closest('.window').style.width='100vw';this.closest('.window').style.height='100vh'">□</div>
<div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
</div>
</div>
<div class="content">${getContent(name)}</div>
`;

document.body.appendChild(win);
windows[name]=win;
}

/* BLOG FULL SCREEN */
function openBlogFull(){

let win=document.createElement("div");
win.className="window";
win.style.top="0";
win.style.left="0";
win.style.width="100vw";
win.style.height="100vh";
win.style.zIndex=999;

win.innerHTML=`
<div class="title-bar">
<span>Blog</span>
<div class="controls">
<div class="winbtn" onclick="this.closest('.window').remove()">X</div>
</div>
</div>
<div class="content">
${getContent("Blog")}
</div>
`;

document.body.appendChild(win);
}

/* CONTENT */
function getContent(name){

if(name==="Home") return "<h1>Welcome</h1>";

if(name==="Videos"){
return "<h1>Videos section here</h1>";
}

/* YOUR BLOG (UNCHANGED EXACTLY AS YOU WROTE) */
if(name==="Blog"){

return `
<h2>Windows 11 Build 26300.2289</h2>

<div id="blogText">
Microsoft has released Windows 11 build 26300.2289 on 4/26/26. Let's talk about it.<br><br>

1st Change: Microsoft has added the new spinny animation from Windows 10x and 11 into even more places.<br><br>

2nd Change: Microsoft has said that the taskbar will be more flexible now being able to go to the top, left, and right. About time!<br><br>

3rd Change: Microsoft said they would let users skip Windows Update in OOBE.<br><br>

4th Change: Microsoft has updated Run. To get the new run, go to Settings > System > Advanced and enable 'Modern Run'.<br><br>

5th and Final: In Windows Update, Dev and Canary were merged into the Experimental Channel.<br><br>

Thanks for reading this blog and have a great day.
</div>

<br>

<button onclick="openBlogFull()">Keep Reading</button>

<div style="position:absolute;bottom:10px;left:10px;font-size:12px;opacity:0.8;">
Created by Brayden Peacock • 4/26/2026
</div>
`;
}

return "Coming soon...";
}

/* DRAG */
let drag=null,ox=0,oy=0;

document.addEventListener("mousedown",e=>{
let bar=e.target.closest(".title-bar");
if(!bar)return;
drag=bar.parentElement;
ox=e.clientX-drag.offsetLeft;
oy=e.clientY-drag.offsetTop;
});

document.addEventListener("mousemove",e=>{
if(!drag)return;
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
});

document.addEventListener("mouseup",()=>drag=null);
</script>

</body>
</html>
