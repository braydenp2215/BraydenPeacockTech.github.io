<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BraydenPeacockTech - Hilly Lunchbox OS</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: url('wallpaper.jpg') no-repeat center center fixed;
            background-size: cover;
            overflow: hidden;
        }

        /* The Main Vista Window */
        .vista-window {
            width: 800px;
            height: 500px;
            margin: 50px auto;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px) saturate(150%);
            -webkit-backdrop-filter: blur(15px) saturate(150%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 8px;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        /* Title Bar */
        .title-bar {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), rgba(255,255,255,0.1));
            border-bottom: 1px solid rgba(255,255,255,0.2);
            border-top-left-radius: 8px;
            border-top-right-radius: 8px;
        }

        .title-text {
            color: white;
            font-size: 14px;
            text-shadow: 0 1px 3px rgba(0,0,0,0.8);
            font-weight: bold;
        }

        /* Main Content Area */
        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* The Icon Sidebar (Software Repository) */
        .sidebar {
            width: 100px;
            background: rgba(0, 0, 0, 0.1);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            flex-direction: column;
            align-items: center;
            padding-top: 20px;
        }

        .nav-icon {
            width: 50px;
            height: 50px;
            margin-bottom: 25px;
            transition: all 0.2s ease;
            cursor: pointer;
            filter: drop-shadow(0 2px 4px rgba(0,0,0,0.3));
        }

        .nav-icon:hover {
            transform: scale(1.2);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.8));
        }

        /* Content Pane */
        .content-pane {
            flex: 1;
            padding: 30px;
            color: white;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
            background: rgba(255, 255, 255, 0.05);
        }

        /* The Fixed Glossy Buttons */
        .button-row {
            margin-top: 30px;
        }

        .vista-btn {
            background: linear-gradient(to bottom, 
                rgba(255,255,255,0.5) 0%, 
                rgba(255,255,255,0.2) 50%, 
                rgba(0,0,0,0.1) 51%, 
                rgba(255,255,255,0.1) 100%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 4px;
            color: white;
            padding: 10px 25px;
            font-size: 14px;
            cursor: pointer;
            margin-right: 10px;
            transition: 0.2s;
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.4);
        }

        .vista-btn:hover {
            border-color: #00d2ff;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            background: linear-gradient(to bottom, rgba(0,210,255,0.4), rgba(0,210,255,0.2));
        }
    </style>
</head>
<body>

<div class="vista-window">
    <div class="title-bar">
        <span class="title-text">Hilly Lunchbox OS - Software Repository</span>
        <div class="window-controls">
            <img src="https://i.imgur.com/39N6FvG.png" style="height: 20px;"> </div>
    </div>

    <div class="main-container">
        <div class="sidebar">
            <img src="home.png" class="nav-icon" title="Home">
            <img src="aboutme.png" class="nav-icon" title="About Me">
            <img src="downloads.png" class="nav-icon" title="Downloads">
            <img src="videos.png" class="nav-icon" title="Videos">
        </div>

        <div class="content-pane">
            <h1>Welcome to the Repository</h1>
            <p>This is the official home for Hilly Lunchbox OS development, assets, and software modifications.</p>
            
            <div class="button-row">
                <button class="vista-btn">View GitHub</button>
                <button class="vista-btn">Download Latest Build</button>
            </div>
        </div>
    </div>
</div>

</body>
</html>
