<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",Tahoma;
    background:url("./wallpaper.jpg") center/cover no-repeat fixed;
}

/* DESKTOP */
.desktop{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:2;
}

.icon{
    width:90px;
    text-align:center;
    color:white;
    cursor:pointer;
    text-shadow:0 2px 6px black;
}

.icon img{
    width:48px;
    height:48px;
}

/* WINDOW */
.window{
    position:absolute;
    width:850px;
    height:540px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.12),
        rgba(255,255,255,0.08));

    backdrop-filter:blur(70px) saturate(240%);
    border:1px solid rgba(255,255,255,0.55);
    border-radius:14px;

    overflow:hidden;
    box-shadow:0 80px 180px rgba(0,0,0,0.85);
}

/* BLOG SMALL DEFAULT SIZE */
.window.small{
    width:650px;
    height:420px;
}

/* FULLSCREEN */
.window.fullscreen{
    top:0 !important;
    left:0 !important;
    width:100vw !important;
    height:calc(100vh - 40px) !important;
}

/* TITLE BAR */
.title-bar{
    height:38px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.90),
        rgba(255,255,255,0.35));

    backdrop-filter:blur(25px);
    cursor:grab;
}

.title-bar span{
    color:white;
    font-weight:600;
    text-shadow:0 2px 8px black;
}

/* BUTTONS */
.controls{display:flex;gap:4px;}

.winbtn{
    width:28px;
    height:19px;
    display:flex;
    align-items:center;
    justify-content:center;

    font-size:12px;
    font-weight:bold;

    background:linear-gradient(to bottom,#fff,#ccc);
    border:1px solid rgba(0,0,0,0.3);
    cursor:pointer;
}

.winbtn.close{
    width:46px;
    color:white;
    background:linear-gradient(to bottom,#ff6a6a,#b30000);
}

/* CONTENT */
.content{
    padding:20px;
    color:white;
    height:calc(100% - 38px);
    overflow:auto;
    text-shadow:0 2px 8px black;
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
}

/* BLOG */
.blog-card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:10px;
}

/* VIDEO */
.video-card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}
</style>
</head>

<body>

<div class="desktop">
    <div class="icon" onclick="openApp('Home')"><img src="./home.png">Home</div>
    <div class="icon" onclick="openApp('About')"><img src="./aboutme.png">About</div>
    <div class="icon" onclick="openApp('Videos')"><img src="./videos.png">Videos</div>
    <div class="icon" onclick="openApp('Blog')"><img src="./pic.png">Blog</div>
    <div class="icon" onclick="openApp('Downloads')"><img src="./downloads.png">Downloads</div>
</div>

<div id="taskbar"></div>

<script>
let z=5;
let windows={};
let states={};

/* OPEN APP */
function openApp(name){

if(windows[name]){
    windows[name].style.display="block";
    windows[name].style.zIndex=++z;
    return;
}

let win=document.createElement("div");
win.className="window";

/* BLOG OPENS SMALL */
if(name==="Blog") win.classList.add("small");

win.style.top="120px";
win.style.left="120px";
win.style.zIndex=++z;

win.innerHTML=`
<div class="title-bar">
    <span>${name}</span>
    <div class="controls">
        <div class="winbtn" onclick="minimizeWin(this)">_</div>
        <div class="winbtn" onclick="toggleFull(this)">□</div>
        <div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
    </div>
</div>
<div class="content">${getContent(name)}</div>
`;

document.body.appendChild(win);
windows[name]=win;
}

/* MINIMIZE */
function minimizeWin(btn){
    btn.closest(".window").style.display="none";
}

/* FULLSCREEN TOGGLE */
function toggleFull(btn){
    let win=btn.closest(".window");

    if(!states[win]){
        states[win]={
            top:win.style.top,
            left:win.style.left,
            width:win.style.width,
            height:win.style.height
        };
        win.classList.add("fullscreen");
    }else{
        let s=states[win];
        win.classList.remove("fullscreen");
        win.style.top=s.top;
        win.style.left=s.left;
        win.style.width=s.width;
        win.style.height=s.height;
        delete states[win];
    }
}

/* CONTENT */
function getContent(name){

if(name==="Videos"){

const videos=[
{title:"Windows Vista dies part 1",id:"YhPE3z1WeVA"},
{title:"Windows 8",id:"rkuYDSrxreA"},
{title:"Evolution of Windows",id:"49OH_v64Fpg"},
{title:"Windows 11 build",id:"Psd7wpNbGRQ"}
];

let html="<h1>Videos</h1>";

videos.forEach(v=>{
html+=`
<div class="video-card">
<h3>${v.title}</h3>
<iframe width="100%" height="260"
src="https://www.youtube.com/embed/${v.id}"
frameborder="0" allowfullscreen></iframe>
</div>`;
});

return html;
}

if(name==="Blog"){
return `
<h1>Blog</h1>

<div class="blog-card">
<h2>Is Microsoft finally doing things right</h2>
<br>
Microsoft released Windows 11 build 26300.2289 on 4/26/26.

<br><br>

1. New animations everywhere  
2. Taskbar moves freely  
3. Skip updates in setup  
4. New Run tool  
5. Dev + Canary merged  

<br><br>

Thanks for reading.
</div>
`;
}

if(name==="Home") return "<h1>Welcome</h1>";
if(name==="About") return "<h2>Brayden Peacock</h2>";
if(name==="Downloads") return "<h1>Downloads</h1>";

return "Coming soon...";
}

/* DRAG */
let drag=null,ox=0,oy=0;

document.addEventListener("mousedown",(e)=>{
let bar=e.target.closest(".title-bar");
if(!bar) return;
drag=bar.parentElement;
ox=e.clientX-drag.offsetLeft;
oy=e.clientY-drag.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(!drag) return;
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
});

document.addEventListener("mouseup",()=>drag=null);
</script>

</body>
</html>
