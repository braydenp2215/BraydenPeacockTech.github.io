<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body { 
    width: 100vw; height: 100vh; overflow: hidden;
    background: #004a99 url("https://cdn.wallpaperhub.app/cloudcache/3/b/9/8/8/5/3b9885c93e8b83598ccccf9857e014c5de9f5c6f.jpg") no-repeat center center fixed;
    background-size: cover; font-family: "Segoe UI", Tahoma, sans-serif;
  }

  /* SIDE TABS */
  .screen-nav {
    position: fixed; right: 40px; top: 50%;
    transform: translateY(-50%);
    display: flex; flex-direction: column; gap: 15px; z-index: 1000;
  }
  .nav-item {
    background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
    padding: 15px 25px; border-radius: 5px; color: white;
    font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.3);
    text-shadow: 0 1px 3px rgba(0,0,0,0.5); cursor: pointer; text-align: center;
    min-width: 140px; transition: 0.2s;
  }
  .nav-item:hover { background: rgba(255, 255, 255, 0.3); transform: translateX(-5px); }

  /* WINDOW - Fixed positioning to ensure it's visible */
  .window { 
    width: 800px; 
    position: absolute;
    top: 15%; left: 15%; /* Starting coordinates so it doesn't vanish */
    background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(30px) saturate(180%);
    border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 8px; 
    box-shadow: 0 25px 60px rgba(0,0,0,0.6);
    display: flex; flex-direction: column; z-index: 999;
  }

  .title-text { line-height: 40px; font-size: 13px; color: white; text-shadow: 0 1px 3px black; }
