<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",Tahoma;
    background:url("./wallpaper.jpg") center/cover no-repeat fixed;
}

/* DESKTOP */
.desktop{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
}
.icon{
    width:80px;
    text-align:center;
    color:white;
    cursor:pointer;
}
.icon img{
    width:48px;
    display:block;
    margin:auto;
}

/* WINDOW */
.window{
    position:absolute;
    width:850px;
    height:540px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(30px);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.7);
}

.title-bar{
    height:35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    background:linear-gradient(#ffffffaa,#ffffff33);
}

.title-bar span{color:white;}

.controls{display:flex;gap:5px;}

.winbtn{
    width:30px;
    height:20px;
    background:#ddd;
    text-align:center;
    cursor:pointer;
}

.winbtn.close{
    background:red;
    color:white;
}

.content{
    padding:20px;
    color:white;
    overflow:auto;
    height:calc(100% - 35px);
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    padding:5px;
}

.taskbtn{
    color:white;
    margin-right:5px;
    padding:5px 10px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;
}

/* BLOG */
.blog-card{
    background:rgba(255,255,255,0.1);
    padding:20px;
    border-radius:10px;
    white-space:pre-wrap;
}

/* ROVER */
#rover-container{
    position:absolute;
    bottom:60px;
    right:30px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:10px;
}

#rover-bubble{
    background:white;
    color:black;
    padding:12px 16px;
    border-radius:15px;
    width:280px;
    font-size:14px;
    font-weight:500;
}

#rover-img{
    width:200px;
    cursor:pointer;
    filter:drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

#search-box{
    display:flex;
    gap:5px;
}

#search-box input{
    padding:6px;
    border-radius:5px;
    border:none;
    outline:none;
}

#search-box button{
    padding:6px 10px;
    background:#4da3ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- DESKTOP -->
<div class="desktop">
    <div class="icon" onclick="openApp('Home')"><img src="./home.png">Home</div>
    <div class="icon" onclick="openApp('About')"><img src="./aboutme.png">About</div>
    <div class="icon" onclick="openApp('Videos')"><img src="./videos.png">Videos</div>
    <div class="icon" onclick="openApp('Blog')"><img src="./pic.png">Blog</div>
    <div class="icon" onclick="openApp('Downloads')"><img src="./downloads.png">Downloads</div>
</div>

<!-- 🐶 ROVER -->
<div id="rover-container">
    <div id="rover-bubble">
        Woof! I'm Rover. Type what you're looking for and I'll find it for you!
    </div>

    <img id="rover-img" src="./search.png">

    <div id="search-box">
        <input id="search" placeholder="Search...">
        <button onclick="searchSite()">Search</button>
    </div>
</div>

<div id="taskbar"></div>

<script>
let windows={};
let z=5;

/* BLOG DATA (UPDATED EXACT TEXT) */
const blogs=[
{
title:"Is Microsoft finally doing things right",
text:`Microsoft has released Windows 11 build 26300.2289 on 4/26/26. Let's talk about it.

1st Change: Microsoft has added the new spinny animation from Windows 10x and 11 into even more places.

2nd Change: Microsoft has said that the taskbar will be more flexible now being able to go to the top, left, and right. About time!

3rd Change: Microsoft said they would let users skip Windows Update in OOBE.

4th Change: Microsoft has updated Run. To get the new run, go to Settings > System > Advanced and enable 'Modern Run'.

5th and Final: In Windows Update, Dev and Canary were merged into the Experimental Channel.

Thanks for reading this blog and have a great day.`
}
];

/* OPEN APP */
function openApp(name){

    if(windows[name]){
        windows[name].style.display="block";
        windows[name].style.zIndex=++z;
        return;
    }

    let win=document.createElement("div");
    win.className="window";
    win.style.top="100px";
    win.style.left="100px";
    win.style.zIndex=++z;

    win.innerHTML=`
        <div class="title-bar">
            <span>${name}</span>
            <div class="controls">
                <div class="winbtn" onclick="this.closest('.window').style.display='none'">_</div>
                <div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
            </div>
        </div>
        <div class="content">${getContent(name)}</div>
    `;

    document.body.appendChild(win);
    windows[name]=win;
    addTask(name);
}

/* TASKBAR */
function addTask(name){
    let b=document.createElement("div");
    b.className="taskbtn";
    b.innerText=name;
    b.onclick=()=>openApp(name);
    document.getElementById("taskbar").appendChild(b);
}

/* CONTENT */
function getContent(name){

    if(name==="Home") return "<h1>Welcome to BraydenPeacockTech</h1>";
    if(name==="About") return "<h2>Brayden Peacock</h2><p>YouTuber & Tech Modder</p>";

    if(name==="Blog"){
        return `<div class="blog-card">
            <h1>${blogs[0].title}</h1>
            <p>${blogs[0].text}</p>
        </div>`;
    }

    if(name==="Videos") return "<h1>Videos (unchanged)</h1>";
    if(name==="Downloads") return "<h1>Downloads (unchanged)</h1>";

    return "Coming soon...";
}

/* ROVER (unchanged behavior kept minimal here) */
function searchSite(){
    let q=document.getElementById("search").value.toLowerCase().trim();
    let b=document.getElementById("rover-bubble");
    let img=document.getElementById("rover-img");

    if(!q) return;

    img.src="./finding.gif";
    b.innerText="Sniff sniff... searching...";

    setTimeout(()=>{
        img.src="./search.png";

        if(q.includes("blog")) openApp("Blog");
        else if(q.includes("video")) openApp("Videos");
        else if(q.includes("about")) openApp("About");
        else if(q.includes("home")) openApp("Home");
        else if(q.includes("download")) openApp("Downloads");
        else b.innerText="Woof... couldn't find that 😢";

    },10000);
}
</script>

</body>
</html>
