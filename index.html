<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",Tahoma;
    background:url("./wallpaper.jpg") center/cover no-repeat fixed;
}

/* 🖥️ DESKTOP ICONS */
.desktop{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:2;
}

.icon{
    width:90px;
    text-align:center;
    color:white;
    cursor:pointer;
    text-shadow:0 2px 6px black;
}

.icon img{
    width:48px;
    height:48px;
}

/* 🪟 VISTA AERO */
.window{
    position:absolute;
    width:850px;
    height:540px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.12),
        rgba(255,255,255,0.08)
    );

    backdrop-filter:blur(70px) saturate(240%);
    border:1px solid rgba(255,255,255,0.55);
    border-radius:14px;

    overflow:hidden;
    box-shadow:0 80px 180px rgba(0,0,0,0.85);
}

/* TITLE BAR */
.title-bar{
    height:38px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.9),
        rgba(255,255,255,0.3)
    );

    cursor:grab;
    user-select:none;
}

.title-bar:active{cursor:grabbing;}

.title-bar span{
    color:white;
    font-weight:600;
    text-shadow:0 2px 8px black;
}

/* BUTTONS */
.controls{display:flex;gap:4px;}

.winbtn{
    width:28px;
    height:19px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
    border-radius:2px;
    background:linear-gradient(to bottom,#fff,#ccc);
    border:1px solid rgba(0,0,0,0.3);
    cursor:pointer;
}

.winbtn:hover{filter:brightness(1.1);}

.winbtn.max{font-size:10px;}

.winbtn.close{
    width:46px;
    color:white;
    background:linear-gradient(to bottom,#ff6a6a,#b30000);
}

/* CONTENT */
.content{
    padding:20px;
    color:white;
    height:calc(100% - 38px);
    overflow:auto;
    text-shadow:0 2px 10px black;
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
    padding:5px;
}

.taskbtn{
    color:white;
    margin-right:5px;
    padding:5px 10px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;
    border-radius:3px;
}

/* BLOG PREVIEW */
.blog-preview{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:10px;
}

/* ROVER */
#rover-container{
    position:absolute;
    bottom:60px;
    right:30px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:10px;
}

#rover-bubble{
    background:white;
    color:black;
    padding:12px 16px;
    border-radius:15px;
    width:280px;
}

#rover-img{
    width:200px;
    filter:drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

#search-box{
    display:flex;
    gap:5px;
}

#search-box input{
    padding:6px;
    border-radius:5px;
    border:none;
}

#search-box button{
    padding:6px 10px;
    background:#4da3ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* FULL BLOG */
#blogReader{
    position:fixed;
    inset:0;
    background:black;
    color:white;
    display:none;
    padding:60px;
    overflow:auto;
}

<div id="taskbar"></div>

let z=5;
let windows={};

/* START SOUND */
document.addEventListener("pointerdown",()=>{
    let a=document.getElementById("startupSound");
    a.volume=0.6;
    a.play().catch(()=>{});
},{once:true});

/* OPEN WINDOW */
function openApp(name){

if(windows[name]){
    windows[name].style.display="block";
    windows[name].style.zIndex=++z;
    return;
}

let win=document.createElement("div");
win.className="window";
win.style.top="120px";
win.style.left="120px";
win.style.zIndex=++z;

win.innerHTML=`
<div class="title-bar">
<span>${name}</span>
<div class="controls">
<div class="winbtn" onclick="this.closest('.window').style.display='none'">_</div>
<div class="winbtn max" onclick="toggleMax(this)">□</div>
<div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
</div>
</div>
<div class="content">${getContent(name)}</div>
`;

document.body.appendChild(win);
windows[name]=win;
addTask(name);
}

/* TASKBAR */
function addTask(name){
let b=document.createElement("div");
b.className="taskbtn";
b.innerText=name;
b.onclick=()=>openApp(name);
document.getElementById("taskbar").appendChild(b);
}

/* MAX */
let maxed={};
function toggleMax(btn){
let w=btn.closest(".window");

if(!maxed[w]){
maxed[w]={
t:w.style.top,l:w.style.left
};
w.style.top="0";
w.style.left="0";
w.style.width="100vw";
w.style.height="calc(100vh - 40px)";
}else{
w.style.top=maxed[w].t;
w.style.left=maxed[w].l;
w.style.width="850px";
w.style.height="540px";
delete maxed[w];
}
}

/* ROVER SEARCH */
function searchSite(){

let q=document.getElementById("search").value.toLowerCase();
let b=document.getElementById("rover-bubble");
let img=document.getElementById("rover-img");

img.src="./finding.gif";
b.innerText="Sniff sniff... searching...";

setTimeout(()=>{
img.src="./search.png";

if(q.includes("home")) openApp("Home");
else if(q.includes("about")) openApp("About");
else if(q.includes("video")) openApp("Videos");
else if(q.includes("blog")) openApp("Blog");
else if(q.includes("download")) openApp("Downloads");
else b.innerText="Woof... nothing found 😢";

},10000);
}

/* DRAG */
let drag=null,ox=0,oy=0;

document.addEventListener("mousedown",(e)=>{
let bar=e.target.closest(".title-bar");
if(!bar) return;
drag=bar.parentElement;
ox=e.clientX-drag.offsetLeft;
oy=e.clientY-drag.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(!drag) return;
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
});

document.addEventListener("mouseup",()=>drag=null);
