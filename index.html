<style>
/* CORE RESET */
* { box-sizing: border-box; margin: 0; padding: 0; }

body, html {
  width: 100vw; height: 100vh;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: #004a99 url("https://cdn.wallpaperhub.app/cloudcache/3/b/9/8/8/5/3b9885c93e8b83598ccccf9857e014c5de9f5c6f.jpg") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
  display: flex; align-items: center; justify-content: center;
}

/* SIDE NAVIGATION */
.screen-nav {
  position: fixed; right: 40px; top: 50%;
  transform: translateY(-50%);
  display: flex; flex-direction: column; gap: 15px; z-index: 10000;
}

.nav-item {
  background: rgba(255, 255, 255, 0.15); backdrop-filter: blur(10px);
  padding: 15px 25px; border-radius: 5px; color: white;
  text-decoration: none; font-weight: bold; border: 1px solid rgba(255, 255, 255, 0.3);
  text-shadow: 0 1px 3px rgba(0,0,0,0.5); cursor: pointer; text-align: center;
  min-width: 140px; transition: 0.2s;
}

.nav-item:hover { background: rgba(255, 255, 255, 0.3); transform: translateX(-5px); }

/* THE AERO WINDOW */
.window {
  width: 650px; position: absolute; z-index: 999;
  border-radius: 8px; background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(30px) saturate(180%);
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 0 0 1px rgba(0,0,0,0.3), 0 25px 60px rgba(0,0,0,0.6);
  overflow: hidden;
}

.titlebar {
  height: 40px; display: flex; justify-content: space-between;
  align-items: flex-start; padding-left: 15px; cursor: move;
}

.title-text { line-height: 40px; font-size: 13px; color: white; text-shadow: 0 1px 3px black; }

/* 3D GEL BUTTONS */
.controls { display: flex; margin-right: 5px; border: 1px solid #111; border-top: none; border-radius: 0 0 4px 4px; overflow: hidden; }

.winbtn { width: 34px; height: 22px; position: relative; cursor: pointer; border-left: 1px solid rgba(0,0,0,0.3); }

.minimize, .maximize { background: linear-gradient(to bottom, #f2f4f7, #aeb9c8 50%, #7d8a9e 51%, #ced6e0); }

.close {
  width: 50px;
  background: linear-gradient(to bottom, #d86a6a, #b82a11 50%, #6a0505 51%, #b82a11);
}

.winbtn::before {
  content: ""; position: absolute; top: 0; left: 0; right: 0; height: 50%;
  background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
}

.close::after { content: "✕"; color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; font-size: 11px; }
.minimize::after { content: "—"; color: #333; position: absolute; top: 40%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; }
.maximize::after { content: "▢"; color: #333; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; }

/* CONTENT AREA */
.content-area { margin: 0 7px 7px 7px; padding: 30px; background: #fff; border-radius: 4px; border: 1px solid #777; color: #111; min-height: 250px; }

.drive-btn {
  display: inline-block; margin-top: 15px; padding: 10px 25px;
  background: linear-gradient(to bottom, #f9f9f9, #dcdcdc);
  border: 1px solid #888; border-radius: 3px; color: #000;
  text-decoration: none; font-weight: bold;
}
</style>
</head>

  <div class="content-area" id="main-view">

  </div>
</div>
