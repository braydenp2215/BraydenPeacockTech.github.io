<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {

  .window {

    border: 1px solid rgba(255, 255, 255, 0.4); border-radius: 8px;

    display: flex; flex-direction: column;
  }

  .titlebar { height: 40px; display: flex; justify-content: space-between; align-items: center; padding: 0 10px 0 15px; }
  .title-text { color: white; font-size: 13px; text-shadow: 0 1px 2px black; font-weight: 500; }

  .controls { display: flex; border: 1px solid #111; border-top: none; border-radius: 0 0 4px 4px; overflow: hidden; }
  .winbtn { width: 34px; height: 22px; position: relative; border-left: 1px solid rgba(0,0,0,0.2); }

  .winbtn::after { color: white; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-weight: bold; font-size: 11px; }
  .close::after { content: "✕"; }

  .content { 
    margin: 0 8px 8px 8px; padding: 25px; background: #ffffff; border-radius: 4px; border: 1px solid #999; color: #111; 
  }

  .thanks-line { display: block; font-weight: bold; font-size: 1.2em; margin-bottom: 10px; color: #d14126; }
  .bio-line { display: block; white-space: nowrap; font-size: 1.1em; margin-bottom: 25px; border-bottom: 1px solid #eee; padding-bottom: 15px; }

  .downloads-header { font-size: 1.5em; font-weight: bold; margin-bottom: 5px; display: block; }
  .latest-text { font-size: 1.1em; margin-bottom: 15px; display: block; color: #444; }

  .drive-btn {
    display: inline-block; padding: 10px 25px;
    background: linear-gradient(to bottom, #f9f9f9, #dcdcdc);
    border: 1px solid #888; border-radius: 3px; color: #000;
    text-decoration: none; font-weight: bold;
    box-shadow: inset 0 1px 0 #fff, 0 1px 2px rgba(0,0,0,0.1);
  }
  .drive-btn:hover { background: linear-gradient(to bottom, #fff, #e5e5e5); border-color: #555; }
</style>
</head>
