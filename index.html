<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Segoe UI", Tahoma, sans-serif;

  background: url("wallpaper.jpg");
  background-size: cover;
  background-position: center;

  overflow: hidden;
}

/* ===== WINDOW ===== */
.window {
  width: 420px;
  border-radius: 10px;
  overflow: hidden;

  position: absolute;
  top: 120px;
  left: 120px;

  background: rgba(255,255,255,0.18);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);

  border: 1px solid rgba(255,255,255,0.35);
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);

  color: white;
}

/* ===== TITLE BAR ===== */
.titlebar {
  display: flex;
  justify-content: space-between;
  align-items: center;

  padding: 6px 10px;

  background: linear-gradient(
    to bottom,
    rgba(120,180,255,0.95),
    rgba(40,90,180,0.95)
  );

  cursor: move; /* important for drag */

  user-select: none;
}

/* ===== BUTTONS ===== */
.controls {
  display: flex;
  gap: 5px;
}

.btn {
  width: 22px;
  height: 18px;

  display: flex;
  align-items: center;
  justify-content: center;

  border-radius: 3px;

  background: rgba(255,255,255,0.3);
  border: 1px solid rgba(255,255,255,0.4);

  font-size: 12px;
  cursor: pointer;
}

.btn:hover {
  background: rgba(255,255,255,0.6);
}

.close:hover {
  background: #ff4d4d;
}

/* ===== CONTENT ===== */
.content {
  padding: 25px;
  text-align: center;
  color: white;
}
</style>
</head>

<body>

<div class="window" id="window">

  <div class="titlebar" id="dragbar">
    <div>Welcome to my website</div>

    <div class="controls">
      <div class="btn" onclick="minimize()">_</div>
      <div class="btn" onclick="maximize()">□</div>
      <div class="btn close" onclick="closeWin()">X</div>
    </div>
  </div>

  <div class="content" id="content">
    <h1>BraydenPeacockTech</h1>
    <p>Vista Aero Style Site</p>
  </div>

</div>

<script>
let win = document.getElementById("window");
let content = document.getElementById("content");

/* ===== DRAGGING ===== */
let drag = false;
let offsetX, offsetY;

document.getElementById("dragbar").addEventListener("mousedown", (e) => {
  drag = true;
  offsetX = e.clientX - win.offsetLeft;
  offsetY = e.clientY - win.offsetTop;
});

document.addEventListener("mousemove", (e) => {
  if (drag) {
    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  }
});

document.addEventListener("mouseup", () => {
  drag = false;
});

/* ===== BUTTONS ===== */
function minimize() {
  content.style.display = content.style.display === "none" ? "block" : "none";
}

function maximize() {
  if (win.dataset.max === "true") {
    win.style.width = "420px";
    win.style.height = "auto";
    win.dataset.max = "false";
  } else {
    win.style.width = "100%";
    win.style.height = "100vh";
    win.style.top = "0";
    win.style.left = "0";
    win.dataset.max = "true";
  }
}

function closeWin() {
  win.style.display = "none";
}
</script>

</body>
</html>
