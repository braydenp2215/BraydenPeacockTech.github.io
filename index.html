<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",Tahoma;
    background:url("./wallpaper.jpg") center/cover no-repeat fixed;
}

/* DESKTOP */
.desktop{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
}
.icon{
    width:80px;
    text-align:center;
    color:white;
    cursor:pointer;
}
.icon img{
    width:48px;
    display:block;
    margin:auto;
}

/* WINDOW */
.window{
    position:absolute;
    width:800px;
    height:500px;
    background:rgba(255,255,255,0.15);
    backdrop-filter:blur(30px);
    border-radius:10px;
    overflow:hidden;
    box-shadow:0 40px 100px rgba(0,0,0,0.7);
}

.title-bar{
    height:35px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;
    background:linear-gradient(#ffffffaa,#ffffff33);
}

.title-bar span{color:white;}

.controls{display:flex;gap:5px;}

.winbtn{
    width:30px;
    height:20px;
    background:#ddd;
    text-align:center;
    cursor:pointer;
}

.winbtn.close{
    background:red;
    color:white;
}

.content{
    padding:20px;
    color:white;
    overflow:auto;
    height:calc(100% - 35px);
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,0,0,0.7);
    display:flex;
    align-items:center;
    padding:5px;
}

.taskbtn{
    color:white;
    margin-right:5px;
    padding:5px 10px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;
}

/* VIDEOS */
.video-card{
    background:rgba(255,255,255,0.1);
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

.video-card iframe{
    width:100%;
    height:250px;
    border:none;
    margin-top:10px;
}

/* 🐶 ROVER */
#rover-container{
    position:absolute;
    bottom:60px;
    right:30px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:10px;
}

#rover-bubble{
    background:white;
    color:black;
    padding:12px 16px;
    border-radius:15px;
    width:260px;
    font-size:14px;
    font-weight:500;
}

#rover-img{
    width:120px;
    cursor:pointer;
}

#search-box{
    display:flex;
    gap:5px;
}

#search-box input{
    padding:6px;
    border-radius:5px;
    border:none;
    outline:none;
}

#search-box button{
    padding:6px 10px;
    background:#4da3ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<div class="desktop">
    <div class="icon" onclick="openApp('Home')"><img src="./home.png">Home</div>
    <div class="icon" onclick="openApp('About')"><img src="./aboutme.png">About</div>
    <div class="icon" onclick="openApp('Videos')"><img src="./videos.png">Videos</div>
</div>

<!-- 🐶 ROVER -->
<div id="rover-container">
    <div id="rover-bubble">Woof! I'm Rover. Type what you're looking for and I'll find it for you!</div>
    <img id="rover-img" src="./search.png">

    <div id="search-box">
        <input id="search" placeholder="Search...">
        <button onclick="searchSite()">Search</button>
    </div>
</div>

<div id="taskbar"></div>

<script>
let windows = {};
let z = 5;

/* VIDEOS */
const videos = [
{title:"Windows Vista dies part 1", id:"YhPE3z1WeVA"},
{title:"Upgrading through every version of Windows Part 1", id:"t684MtGv31Y"},
{title:"Installing and Exploring Windows 8 8032", id:"rkuYDSrxreA"},
{title:"The Evolution of Windows", id:"49OH_v64Fpg"},
{title:"New BetaTester Intro", id:"XR2AoWhmjMk"},
{title:"Upgrading to Windows 10 like its 2016", id:"ugu-VQdo-8I"},
{title:"Exploring Windows 11 Build 29531.1000", id:"Psd7wpNbGRQ"},
{title:"My PC and a weird video", id:"vFLD3-0Cs4E"},
{title:"Installing & Exploring Windows 10 10074", id:"CNeIqVY3niM"},
{title:"Upgrading through almost every version of Windows Part 2", id:"b5A4vUXMPpg"}
];

/* OPEN WINDOW */
function openApp(name){
    if(windows[name]){
        windows[name].style.display="block";
        windows[name].style.zIndex=++z;
        return;
    }

    let win=document.createElement("div");
    win.className="window";
    win.style.top="100px";
    win.style.left="100px";
    win.style.zIndex=++z;

    win.innerHTML=`
        <div class="title-bar">
            <span>${name}</span>
            <div class="controls">
                <div class="winbtn" onclick="this.closest('.window').style.display='none'">_</div>
                <div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
            </div>
        </div>
        <div class="content">${getContent(name)}</div>
    `;

    document.body.appendChild(win);
    windows[name]=win;
    addTask(name);
}

/* TASKBAR */
function addTask(name){
    let btn=document.createElement("div");
    btn.className="taskbtn";
    btn.innerText=name;
    btn.onclick=()=>openApp(name);
    document.getElementById("taskbar").appendChild(btn);
}

/* CONTENT */
function getContent(name){
    if(name==="Home") return "<h1>Welcome to BraydenPeacockTech</h1>";
    if(name==="About") return "<h2>Brayden Peacock</h2><p>Tech modder and YouTuber.</p>";

    if(name==="Videos"){
        let html="<h1>My Videos</h1>";
        videos.forEach(v=>{
            html+=`
            <div class="video-card">
                <h3>${v.title}</h3>
                <iframe src="https://www.youtube.com/embed/${v.id}" allowfullscreen></iframe>
            </div>`;
        });
        return html;
    }

    return "Coming soon...";
}

/* 🐶 ROVER SEARCH (WITH DELAY) */
function searchSite(){
    let q=document.getElementById("search").value.toLowerCase().trim();
    let bubble=document.getElementById("rover-bubble");
    let img=document.getElementById("rover-img");

    if(!q) return;

    // start animation
    img.src="./finding.gif";
    bubble.innerText="Sniff sniff... searching for '" + q + "'...";

    setTimeout(()=>{

        img.src="./search.png";

        if(q.includes("home")){
            openApp("Home");
            bubble.innerText="Woof! Opening Home!";
            return;
        }

        if(q.includes("about")){
            openApp("About");
            bubble.innerText="Woof! Opening About!";
            return;
        }

        if(q.includes("video")){
            openApp("Videos");
            bubble.innerText="Woof! Here are your videos!";
            return;
        }

        let found=videos.find(v=>v.title.toLowerCase().includes(q));

        if(found){
            openApp("Videos");
            bubble.innerText="Woof! Found: " + found.title;
        }else{
            bubble.innerText="Woof... couldn't find that 😢";
        }

    },10000); // ⏳ 10 second delay
}
</script>

</body>
</html>
