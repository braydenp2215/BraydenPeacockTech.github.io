<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
body {
  margin: 0;
  height: 100vh;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: linear-gradient(135deg, #2b5876, #4e4376);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== WINDOW ===== */
.window {
  width: 420px;
  border-radius: 14px;
  overflow: hidden;

  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  color: white;
}

/* ===== TITLE BAR ===== */
.titlebar {
  padding: 10px 15px;
  font-size: 14px;
  font-weight: 600;

  background: linear-gradient(
    to bottom,
    rgba(255,255,255,0.35),
    rgba(255,255,255,0.10)
  );

  border-bottom: 1px solid rgba(255,255,255,0.25);
  text-shadow: 0 1px 2px rgba(0,0,0,0.4);
}

/* ===== CONTENT ===== */
.content {
  padding: 25px;
  text-align: center;
}

h1 {
  margin: 0;
  font-size: 26px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

p {
  opacity: 0.9;
  margin-top: 10px;
}

.small {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="window">

  <div class="titlebar">
    Welcome to my website
  </div>

  <div class="content">
    <h1>BraydenPeacockTech</h1>
    <p>Vista-style tech site</p>
    <div class="small">Built with GitHub Pages</div>
  </div>

</div>

</body>
</html>
