<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",Tahoma;
    background:url("./wallpaper.jpg") center/cover no-repeat fixed;
}

/* 🖥️ DESKTOP */
.desktop{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:2;
}

.icon{
    width:90px;
    text-align:center;
    color:white;
    cursor:pointer;
    text-shadow:0 2px 6px black;
}

.icon img{
    width:48px;
    height:48px;
}

/* 🪟 WINDOW */
.window{
    position:absolute;
    width:850px;
    height:540px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.12),
        rgba(255,255,255,0.08));

    backdrop-filter:blur(70px) saturate(240%);
    border:1px solid rgba(255,255,255,0.55);
    border-radius:14px;

    overflow:hidden;
    box-shadow:0 80px 180px rgba(0,0,0,0.85);
}

/* BLOG SMALL */
.window.blog{
    width:650px;
    height:450px;
}

/* FULLSCREEN */
.window.fullscreen{
    top:0 !important;
    left:0 !important;
    width:100vw !important;
    height:calc(100vh - 40px) !important;
}

/* TITLE */
.title-bar{
    height:38px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.9),
        rgba(255,255,255,0.3));

    backdrop-filter:blur(25px);
    cursor:grab;
}

.title-bar span{
    color:white;
    font-weight:600;
    text-shadow:0 2px 8px black;
}

/* BUTTONS */
.controls{display:flex;gap:4px;}

.winbtn{
    width:28px;
    height:19px;
    display:flex;
    align-items:center;
    justify-content:center;

    font-size:12px;
    font-weight:bold;

    background:linear-gradient(to bottom,#fff,#ccc);
    border:1px solid rgba(0,0,0,0.3);
    cursor:pointer;
}

.winbtn.close{
    width:46px;
    color:white;
    background:linear-gradient(to bottom,#ff6a6a,#b30000);
}

/* CONTENT */
.content{
    padding:20px;
    color:white;
    height:calc(100% - 38px);
    overflow:auto;
    text-shadow:0 2px 8px black;
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,0,0,0.65);
}

/* BLOG */
.blog-card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:10px;
    white-space:pre-wrap;
    line-height:1.6;
}

/* VIDEO */
.video-card{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:10px;
    margin-bottom:15px;
}

/* 🐶 ROVER */
#rover{
    position:absolute;
    bottom:60px;
    right:30px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:10px;
}

#rover img{
    width:200px;
    filter:drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

#bubble{
    background:white;
    color:black;
    padding:12px 16px;
    border-radius:15px;
    width:280px;
    font-size:14px;
}

#searchbox{
    display:flex;
    gap:5px;
}

#searchbox input{
    padding:6px;
    border-radius:5px;
    border:none;
    outline:none;
}

#searchbox button{
    padding:6px 10px;
    background:#4da3ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}
</style>
</head>

<body>

<!-- 🔊 START SOUND -->
<audio id="startupSound" src="./vista-startup.mp3"></audio>

<!-- 🖥️ ICONS -->
<div class="desktop">
    <div class="icon" onclick="openApp('Home')"><img src="./home.png">Home</div>
    <div class="icon" onclick="openApp('About')"><img src="./aboutme.png">About</div>
    <div class="icon" onclick="openApp('Videos')"><img src="./videos.png">Videos</div>
    <div class="icon" onclick="openApp('Blog')"><img src="./pic.png">Blog</div>
    <div class="icon" onclick="openApp('Downloads')"><img src="./downloads.png">Downloads</div>
</div>

<div id="taskbar"></div>

<!-- 🐶 ROVER (BACK + FIXED) -->
<div id="rover">
    <div id="bubble">Woof! I'm Rover. Type what you're looking for and I'll find it for you!</div>
    <img id="dog" src="./search.png">

    <div id="searchbox">
        <input id="search">
        <button onclick="searchSite()">Search</button>
    </div>
</div>

<script>
let z=5;
let win={};
let full={};

/* SOUND */
document.addEventListener("pointerdown",()=>{
    const a=document.getElementById("startupSound");
    a.volume=0.6;
    a.play().catch(()=>{});
},{once:true});

/* OPEN */
function openApp(name){

if(win[name]){
    win[name].style.display="block";
    win[name].style.zIndex=++z;
    return;
}

let w=document.createElement("div");
w.className="window";

if(name==="Blog") w.classList.add("blog");

w.style.top="120px";
w.style.left="120px";
w.style.zIndex=++z;

w.innerHTML=`
<div class="title-bar">
<span>${name}</span>
<div class="controls">
<div class="winbtn" onclick="min(this)">_</div>
<div class="winbtn" onclick="max(this)">□</div>
<div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
</div>
</div>
<div class="content">${content(name)}</div>
`;

document.body.appendChild(w);
win[name]=w;
}

/* MIN */
function min(b){
b.closest(".window").style.display="none";
}

/* MAX */
function max(b){
let w=b.closest(".window");

if(!full[w]){
    full[w]={
        top:w.style.top,
        left:w.style.left,
        width:w.style.width,
        height:w.style.height
    };

    w.classList.add("fullscreen");
}else{
    w.classList.remove("fullscreen");
    let s=full[w];
    w.style.top=s.top;
    w.style.left=s.left;
    w.style.width=s.width;
    w.style.height=s.height;
    delete full[w];
}
}

/* CONTENT */
function content(n){

if(n==="Videos"){

const v=[
["Vista dies part 1","YhPE3z1WeVA"],
["Windows XP","YZYM4031WoI"],
["Windows 11","Psd7wpNbGRQ"],
["System","mEoJBW3VvGQ"],
["Win 10 install","CNeIqVY3niM"],
["Windows 8","rkuYDSrxreA"]
];

let h="<h1>Videos</h1>";

v.forEach(x=>{
h+=`
<div class="video-card">
<h3>${x[0]}</h3>
<iframe width="100%" height="260"
src="https://www.youtube.com/embed/${x[1]}"
allowfullscreen></iframe>
</div>`;
});

return h;
}

if(n==="Blog"){
return `
<h1>Blog</h1>

<div class="blog-card">
Is Microsoft finally doing things right

Microsoft released Windows 11 build 26300.2289 on 4/26/26.

1st Change: new animations  
2nd Change: movable taskbar  
3rd Change: skip updates  
4th Change: new Run menu  
5th Change: merged channels  

Thanks for reading.
</div>`;
}

if(n==="Home") return "<h1>Welcome</h1>";
if(n==="About") return "<h2>Brayden Peacock</h2>";
if(n==="Downloads") return "<h1>Downloads</h1>";

return "Coming soon...";
}

/* 🐶 ROVER SEARCH (10 SEC DELAY) */
function searchSite(){

let q=document.getElementById("search").value.toLowerCase();
let b=document.getElementById("bubble");
let d=document.getElementById("dog");

if(!q) return;

d.src="./finding.gif";
b.innerText="Sniff sniff... searching...";

setTimeout(()=>{

d.src="./search.png";

if(q.includes("video")) openApp("Videos");
else if(q.includes("blog")) openApp("Blog");
else if(q.includes("home")) openApp("Home");
else if(q.includes("about")) openApp("About");
else b.innerText="Woof... couldn't find it 😢";

},10000);
}

/* DRAG */
let drag=null,ox=0,oy=0;

document.addEventListener("mousedown",(e)=>{
let t=e.target.closest(".title-bar");
if(!t) return;
drag=t.parentElement;
ox=e.clientX-drag.offsetLeft;
oy=e.clientY-drag.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(!drag) return;
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
});

document.addEventListener("mouseup",()=>drag=null);
</script>

</body>
</html>
