<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100vw;
    height:100vh;
    overflow:hidden;
    font-family:"Segoe UI",Tahoma;
    background:url("./wallpaper.jpg") center/cover no-repeat fixed;
}

/* 🖥️ DESKTOP ICONS */
.desktop{
    position:absolute;
    top:20px;
    left:20px;
    display:flex;
    flex-direction:column;
    gap:20px;
    z-index:2;
}

.icon{
    width:90px;
    text-align:center;
    color:white;
    cursor:pointer;
    text-shadow:0 2px 6px black;
}

.icon img{
    width:48px;
    height:48px;
}

/* 🪟 VISTA AERO */
.window{
    position:absolute;
    width:850px;
    height:540px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.25),
        rgba(255,255,255,0.12),
        rgba(255,255,255,0.08)
    );

    backdrop-filter:blur(70px) saturate(240%);
    border:1px solid rgba(255,255,255,0.55);
    border-radius:14px;

    overflow:hidden;
    box-shadow:0 80px 180px rgba(0,0,0,0.85);
}

/* TITLE BAR */
.title-bar{
    height:38px;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:0 10px;

    background:linear-gradient(to bottom,
        rgba(255,255,255,0.9),
        rgba(255,255,255,0.3)
    );

    cursor:grab;
    user-select:none;
}

.title-bar:active{cursor:grabbing;}

.title-bar span{
    color:white;
    font-weight:600;
    text-shadow:0 2px 8px black;
}

/* BUTTONS */
.controls{display:flex;gap:4px;}

.winbtn{
    width:28px;
    height:19px;
    display:flex;
    align-items:center;
    justify-content:center;
    font-size:12px;
    font-weight:bold;
    border-radius:2px;
    background:linear-gradient(to bottom,#fff,#ccc);
    border:1px solid rgba(0,0,0,0.3);
    cursor:pointer;
}

.winbtn:hover{filter:brightness(1.1);}

.winbtn.max{font-size:10px;}

.winbtn.close{
    width:46px;
    color:white;
    background:linear-gradient(to bottom,#ff6a6a,#b30000);
}

/* CONTENT */
.content{
    padding:20px;
    color:white;
    height:calc(100% - 38px);
    overflow:auto;
    text-shadow:0 2px 10px black;
}

/* TASKBAR */
#taskbar{
    position:absolute;
    bottom:0;
    width:100%;
    height:40px;
    background:rgba(0,0,0,0.65);
    display:flex;
    align-items:center;
    padding:5px;
}

.taskbtn{
    color:white;
    margin-right:5px;
    padding:5px 10px;
    background:rgba(255,255,255,0.2);
    cursor:pointer;
    border-radius:3px;
}

/* BLOG PREVIEW */
.blog-preview{
    background:rgba(255,255,255,0.12);
    padding:15px;
    border-radius:10px;
}

/* ROVER */
#rover-container{
    position:absolute;
    bottom:60px;
    right:30px;
    display:flex;
    flex-direction:column;
    align-items:flex-end;
    gap:10px;
}

#rover-bubble{
    background:white;
    color:black;
    padding:12px 16px;
    border-radius:15px;
    width:280px;
}

#rover-img{
    width:200px;
    filter:drop-shadow(0 10px 20px rgba(0,0,0,0.5));
}

#search-box{
    display:flex;
    gap:5px;
}

#search-box input{
    padding:6px;
    border-radius:5px;
    border:none;
}

#search-box button{
    padding:6px 10px;
    background:#4da3ff;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

/* FULL BLOG */
#blogReader{
    position:fixed;
    inset:0;
    background:black;
    color:white;
    display:none;
    padding:60px;
    overflow:auto;
}
</style>
</head>

<body>

<!-- SOUND -->
<audio id="startupSound" src="./vista-startup.mp3"></audio>

<!-- DESKTOP -->
<div class="desktop">
    <div class="icon" onclick="openApp('Home')"><img src="./home.png">Home</div>
    <div class="icon" onclick="openApp('About')"><img src="./aboutme.png">About</div>
    <div class="icon" onclick="openApp('Videos')"><img src="./videos.png">Videos</div>
    <div class="icon" onclick="openApp('Blog')"><img src="./pic.png">Blog</div>
    <div class="icon" onclick="openApp('Downloads')"><img src="./downloads.png">Downloads</div>
</div>

<div id="taskbar"></div>

<!-- 🐶 ROVER -->
<div id="rover-container">
    <div id="rover-bubble">Woof! I'm Rover. Type what you're looking for and I'll find it for you!</div>
    <img id="rover-img" src="./search.png">
    <div id="search-box">
        <input id="search">
        <button onclick="searchSite()">Search</button>
    </div>
</div>

<!-- BLOG FULLSCREEN -->
<div id="blogReader"></div>

<script>
let z=5;
let windows={};

/* START SOUND */
document.addEventListener("pointerdown",()=>{
    let a=document.getElementById("startupSound");
    a.volume=0.6;
    a.play().catch(()=>{});
},{once:true});

/* OPEN WINDOW */
function openApp(name){

if(windows[name]){
    windows[name].style.display="block";
    windows[name].style.zIndex=++z;
    return;
}

let win=document.createElement("div");
win.className="window";
win.style.top="120px";
win.style.left="120px";
win.style.zIndex=++z;

win.innerHTML=`
<div class="title-bar">
<span>${name}</span>
<div class="controls">
<div class="winbtn" onclick="this.closest('.window').style.display='none'">_</div>
<div class="winbtn max" onclick="toggleMax(this)">□</div>
<div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
</div>
</div>
<div class="content">${getContent(name)}</div>
`;

document.body.appendChild(win);
windows[name]=win;
addTask(name);
}

/* TASKBAR */
function addTask(name){
let b=document.createElement("div");
b.className="taskbtn";
b.innerText=name;
b.onclick=()=>openApp(name);
document.getElementById("taskbar").appendChild(b);
}

/* MAX */
let maxed={};
function toggleMax(btn){
let w=btn.closest(".window");

if(!maxed[w]){
maxed[w]={
t:w.style.top,l:w.style.left
};
w.style.top="0";
w.style.left="0";
w.style.width="100vw";
w.style.height="calc(100vh - 40px)";
}else{
w.style.top=maxed[w].t;
w.style.left=maxed[w].l;
w.style.width="850px";
w.style.height="540px";
delete maxed[w];
}
}

/* CONTENT */
function getContent(name){

/* VIDEOS */
if(name==="Videos"){

const videos=[
{title:"Windows Vista dies part 1",id:"YhPE3z1WeVA"},
{title:"Upgrading Windows Part 1",id:"t684MtGv31Y"},
{title:"Windows 8 8032",id:"rkuYDSrxreA"},
{title:"Evolution of Windows",id:"49OH_v64Fpg"},
{title:"Windows 10 10074",id:"CNeIqVY3niM"},
{title:"Windows 11 build 29531",id:"Psd7wpNbGRQ"},
{title:"System",id:"mEoJBW3VvGQ"},
{title:"Destroying Windows 11 viruses",id:"TPMCbeakcgs"},
{title:"Windows 98 to XP",id:"YZYM4031WoI"},
{title:"Super11 ISO",id:"Ein11cKmK_M"}
];

let html="<h1>Videos</h1>";

videos.forEach(v=>{
html+=`
<div style="margin-bottom:15px;background:rgba(255,255,255,0.12);padding:10px;border-radius:10px;">
<h3>${v.title}</h3>
<iframe width="100%" height="260"
src="https://www.youtube.com/embed/${v.id}"
allowfullscreen></iframe>
</div>`;
});

return html;
}

/* BLOG PREVIEW */
if(name==="Blog"){
return `
<div class="blog-preview">
<h2>Windows 11 Update Thoughts</h2>
<p>
Microsoft has released Windows 11 build 26300.2289 on 4/26/26...
</p>
<br>
<button onclick="openBlog()">Read More</button>
</div>`;
}

if(name==="Home") return "<h1>Welcome</h1>";
if(name==="About") return "<h2>Brayden Peacock</h2>";
if(name==="Downloads") return "<h1>Downloads</h1>";

return "Coming soon...";
}

/* FULL BLOG */
function openBlog(){
document.getElementById("blogReader").style.display="block";

document.getElementById("blogReader").innerHTML=`
<h1>Windows 11 Update Thoughts</h1>
<br>
<p>
Microsoft has released Windows 11 build 26300.2289 on 4/26/26. Let's talk about it.

1st Change: Microsoft has added spinny animations...

2nd Change: Taskbar flexibility...

3rd Change: Skip Windows Update in OOBE...

4th Change: Modern Run added...

5th: Dev + Canary merged...

Thanks for reading.
</p>
<button onclick="document.getElementById('blogReader').style.display='none'">Close</button>
`;
}

/* ROVER SEARCH */
function searchSite(){

let q=document.getElementById("search").value.toLowerCase();
let b=document.getElementById("rover-bubble");
let img=document.getElementById("rover-img");

img.src="./finding.gif";
b.innerText="Sniff sniff... searching...";

setTimeout(()=>{
img.src="./search.png";

if(q.includes("home")) openApp("Home");
else if(q.includes("about")) openApp("About");
else if(q.includes("video")) openApp("Videos");
else if(q.includes("blog")) openApp("Blog");
else if(q.includes("download")) openApp("Downloads");
else b.innerText="Woof... nothing found 😢";

},10000);
}

/* DRAG */
let drag=null,ox=0,oy=0;

document.addEventListener("mousedown",(e)=>{
let bar=e.target.closest(".title-bar");
if(!bar) return;
drag=bar.parentElement;
ox=e.clientX-drag.offsetLeft;
oy=e.clientY-drag.offsetTop;
});

document.addEventListener("mousemove",(e)=>{
if(!drag) return;
drag.style.left=(e.clientX-ox)+"px";
drag.style.top=(e.clientY-oy)+"px";
});

document.addEventListener("mouseup",()=>drag=null);
</script>

</body>
</html>
