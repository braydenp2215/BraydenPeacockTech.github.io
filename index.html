<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: url("https://cdn.wallpaperhub.app/cloudcache/3/b/9/8/8/5/3b9885c93e8b83598ccccf9857e014c5de9f5c6f.jpg") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== EXTERNAL NAVIGATION (RIGHT SIDE) ===== */
.screen-nav {
  position: fixed;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 10000;
}

.nav-item {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  padding: 15px 25px;
  border-radius: 5px;
  color: white;
  text-decoration: none;
  font-weight: bold;
  border: 1px solid rgba(255, 255, 255, 0.3);
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  transition: all 0.2s;
  cursor: pointer;
  text-align: center;
  min-width: 100px;
}

.nav-item:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateX(-5px);
}

/* ===== THE WINDOW ===== */
.window {
  width: 600px;
  position: absolute;
  z-index: 999;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(25px) saturate(160%);
  -webkit-backdrop-filter: blur(25px) saturate(160%);
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.3), 0 25px 60px rgba(0, 0, 0, 0.6);
  overflow: hidden;
  transition: width 0.3s, height 0.3s;
}

.titlebar {
  height: 40px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-left: 15px;
  cursor: move;
  user-select: none;
}

.title-text {
  line-height: 40px;
  font-size: 13px;
  color: white;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7);
}

/* ===== METALLIC BUTTONS ===== */
.controls {
  display: flex;
  margin-top: 1px;
  margin-right: 5px;
  border: 1px solid #111;
  border-top: none;
  border-radius: 0 0 4px 4px;
  overflow: hidden;
}

.winbtn {
  width: 34px;
  height: 23px;
  position: relative;
  cursor: pointer;
  border-left: 1px solid rgba(0,0,0,0.3);
  background-image: linear-gradient(to bottom, rgba(255,255,255,0.4) 0%, rgba(255,255,255,0.1) 48%, rgba(255,255,255,0) 52%, rgba(255,255,255,0.1) 100%);
}

.minimize, .maximize {
  background: linear-gradient(to bottom, #f2f4f7 0%, #cbd3de 48%, #aeb9c8 52%, #ced6e0 100%);
}

.close {
  width: 50px;
  background: linear-gradient(to bottom, #ef9f8d 0%, #e27c67 48%, #d14d31 52%, #aa1f05 100%);
  border-left: 1px solid #7a1604;
}

.minimize::after { content: ""; position: absolute; width: 8px; height: 2px; background: #333; bottom: 7px; left: 13px; }
.maximize::after { content: ""; position: absolute; width: 10px; height: 8px; border: 1.5px solid #333; top: 6px; left: 11px; }
.close::before, .close::after { content: ""; position: absolute; width: 15px; height: 2px; background: white; top: 10px; left: 17px; }
.close::before { transform: rotate(45deg); }
.close::after { transform: rotate(-45deg); }

/* Content Area */
.content-wrapper {
  transition: max-height 0.3s ease-out;
  max-height: 1000px;
}

.content {
  margin: 0 7px 7px 7px;
  padding: 30px;
  background: #ffffff;
  border-radius: 4px;
  border: 1px solid rgba(0,0,0,0.2);
  color: #222;
  min-height: 200px;
}

/* Download Button Style */
.dl-button {
  display: inline-block;
  padding: 10px 20px;
  background: linear-gradient(to bottom, #f9f9f9, #e1e1e1);
  border: 1px solid #999;
  border-radius: 3px;
  color: #333;
  text-decoration: none;
  font-weight: bold;
  box-shadow: inset 0 1px 0 #fff, 0 1px 2px rgba(0,0,0,0.1);
  transition: 0.2s;
}

.dl-button:hover {
  background: linear-gradient(to bottom, #fff, #ececec);
  border-color: #666;
}

.is-minimized .content-wrapper {
  max-height: 0;
}
</style>
</head>
<body>

<nav class="screen-nav">
  <div class="nav-item" onclick="changeContent('home')">Home</div>
  <div class="nav-item" onclick="changeContent('about')">About Me</div>
  <div class="nav-item" onclick="changeContent('downloads')">Downloads</div>
</nav>

<div class="window" id="window">
  <div class="titlebar" id="dragbar">
    <div class="title-text" id="window-title">Windows Vista Aero Site</div>
    <div class="controls">
      <div class="winbtn minimize" onclick="toggleMinimize()"></div>
      <div class="winbtn maximize" onclick="maximizeWindow()"></div>
      <div class="winbtn close" onclick="closeWindow()"></div>
    </div>
  </div>
  
  <div class="content-wrapper" id="content-wrapper">
    <div class="content" id="main-content">
      <h2 style="margin-top: 0;">Welcome</h2>
      <p>The window name remains visible even when minimized.</p>
    </div>
  </div>
</div>

<script>
const pages = {
  home: { 
    title: "Windows Vista Aero Site", 
    body: "<h2 style='margin-top: 0;'>Welcome</h2><p>Home content loaded.</p>" 
  },
  about: { 
    title: "About Me", 
    body: "<h2 style='margin-top: 0;'>About Me</h2><p>Legacy UI developer.</p>" 
  },
  downloads: { 
    title: "Downloads Explorer", 
    body: `
      <h2 style='margin-top: 0;'>Downloads</h2>
      <p>Click the button below to view the shared file:</p>
      <div style="margin-top: 20px;">
        <a href="https://drive.google.com/file/d/1TZeW-wMhtms_T-WDnx891Ftco-1ZcoPV/view?usp=drive_link" 
           target="_blank" 
           class="dl-button">
           View on Google Drive
        </a>
      </div>
    ` 
  }
};

const win = document.getElementById("window");
const wrapper = document.getElementById("content-wrapper");
let isMaximized = false;
let isMinimized = false;
let lastPos = { top: '150px', left: '150px', width: '600px' };

function changeContent(pageKey) {
  win.style.display = 'block';
  if(isMinimized) toggleMinimize(); 
  document.getElementById('main-content').innerHTML = pages[pageKey].body;
  document.getElementById('window-title').innerText = pages[pageKey].title;
}

function closeWindow() { win.style.display = 'none'; }

function toggleMinimize() {
  if (!isMinimized) {
    win.classList.add('is-minimized');
    isMinimized = true;
  } else {
    win.classList.remove('is-minimized');
    isMinimized = false;
  }
}

function maximizeWindow() {
  if (!isMaximized) {
    lastPos.top = win.style.top;
    lastPos.left = win.style.left;
    lastPos.width = win.style.width;
    
    win.style.top = "0";
    win.style.left = "0";
    win.style.width = "100vw";
    win.style.height = "100vh";
    win.style.borderRadius = "0";
    isMaximized = true;
  } else {
    win.style.top = lastPos.top;
    win.style.left = lastPos.left;
    win.style.width = lastPos.width;
    win.style.height = "auto";
    win.style.borderRadius = "8px";
    isMaximized = false;
  }
}

let drag = false;
let offsetX, offsetY;

document.getElementById("dragbar").onmousedown = (e) => {
  if (isMaximized) return;
  drag = true;
  offsetX = e.clientX - win.offsetLeft;
  offsetY = e.clientY - win.offsetTop;
};

document.onmousemove = (e) => {
  if (drag) {
    win.style.left = (e.clientX - offsetX) + "px";
    win.style.top = (e.clientY - offsetY) + "px";
  }
};

document.onmouseup = () => drag = false;
