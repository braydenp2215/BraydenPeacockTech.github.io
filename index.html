<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech - Super11</title>

<style>
html, body {
  margin: 0;
  padding: 0;
  width: 100vw;
  height: 100vh;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: url("https://cdn.wallpaperhub.app/cloudcache/3/b/9/8/8/5/3b9885c93e8b83598ccccf9857e014c5de9f5c6f.jpg") no-repeat center center fixed;
  background-size: cover;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ===== EXTERNAL NAVIGATION ===== */
.screen-nav {
  position: fixed;
  right: 40px;
  top: 50%;
  transform: translateY(-50%);
  display: flex;
  flex-direction: column;
  gap: 15px;
  z-index: 10000;
}

.nav-item {
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(10px);
  padding: 15px 25px;
  border-radius: 5px;
  color: white;
  text-decoration: none;
  font-weight: bold;
  border: 1px solid rgba(255, 255, 255, 0.3);
  text-shadow: 0 1px 3px rgba(0,0,0,0.5);
  transition: all 0.2s;
  cursor: pointer;
  text-align: center;
  min-width: 120px;
}

.nav-item:hover {
  background: rgba(255, 255, 255, 0.3);
  transform: translateX(-5px);
}

/* ===== THE WINDOW ===== */
.window {
  width: 600px;
  position: absolute;
  z-index: 999;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.2);
  backdrop-filter: blur(25px) saturate(160%);
  -webkit-backdrop-filter: blur(25px) saturate(160%);
  border: 1px solid rgba(255, 255, 255, 0.5);
  box-shadow: 0 0 0 1px rgba(0, 0, 0, 0.3), 0 25px 60px rgba(0, 0, 0, 0.6);
  overflow: hidden;
  transition: width 0.3s, height 0.3s;
}

.titlebar {
  height: 40px;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  padding-left: 15px;
  cursor: move;
  user-select: none;
}

.title-text {
  line-height: 40px;
  font-size: 13px;
  color: white;
  text-shadow: 0 1px 3px rgba(0,0,0,0.7);
}

/* ===== METALLIC BUTTONS ===== */
.controls {
  display: flex;
  margin-top: 1px;
  margin-right: 5px;
  border: 1px solid #111;
  border-top: none;
  border-radius: 0 0 4px 4px;
  overflow: hidden;
}
