<!DOCTYPE html>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
width:100vw;
height:100vh;
overflow:hidden;
font-family:"Segoe UI",Tahoma;
background:linear-gradient(#0a0a0a,#1a1a1a);
color:white;
}

/* DESKTOP */
.desktop{
position:absolute;
top:20px;
left:20px;
display:flex;
flex-direction:column;
gap:15px;
}

.icon{
padding:10px;
background:rgba(255,255,255,0.08);
border:1px solid rgba(255,255,255,0.2);
border-radius:6px;
cursor:pointer;
width:120px;
text-align:center;
}

/* WINDOW */
.window{
position:absolute;
width:900px;
height:600px;
background:rgba(30,30,30,0.95);
border:1px solid #444;
border-radius:10px;
overflow:hidden;
z-index:10;
}

.title-bar{
height:40px;
background:#2a2a2a;
display:flex;
justify-content:space-between;
align-items:center;
padding:0 10px;
}

.controls{display:flex;gap:6px;}

.winbtn{
width:28px;
height:20px;
background:#666;
display:flex;
align-items:center;
justify-content:center;
cursor:pointer;
font-size:12px;
}
.winbtn.close{background:#c0392b;color:white;}

.content{
padding:15px;
height:calc(100% - 40px);
overflow:auto;
}

/* BLOG FULLSCREEN */
.fullscreen{
position:fixed !important;
top:0 !important;
left:0 !important;
width:100vw !important;
height:100vh !important;
z-index:9999 !important;
}

/* VISTA STYLE TASKBAR (RESTORED SMALL GLASS BAR) */
#taskbar{
position:absolute;
bottom:0;
left:0;
width:100%;
height:32px;
background:rgba(255,255,255,0.12);
backdrop-filter:blur(10px);
border-top:1px solid rgba(255,255,255,0.2);
display:flex;
align-items:center;
padding-left:10px;
gap:10px;
font-size:12px;
}

/* ROVER */
#rover{
position:absolute;
bottom:40px;
right:20px;
width:260px;
}

#rover input{
width:100%;
padding:6px;
}
</style>
</head>

<body>

<!-- DESKTOP -->
<div class="desktop">
<div class="icon" onclick="openApp('Home')">Home</div>
<div class="icon" onclick="openApp('Videos')">Videos</div>
<div class="icon" onclick="openApp('Blog')">Blog</div>
<div class="icon" onclick="openApp('About')">About</div>
<div class="icon" onclick="openApp('Downloads')">Downloads</div>
</div>

<!-- ROVER -->
<div id="rover">
<input id="roverInput" placeholder="Ask Rover...">
<button onclick="roverSearch()">Search</button>
</div>

<!-- TASKBAR (VISTA STYLE) -->
<div id="taskbar">
Start | BraydenPeacockTech
</div>

let windows={};
let blogWindow=null;
let blogFull=false;

/* OPEN WINDOW */
function openApp(name){

if(windows[name]){
windows[name].style.display="block";
return;
}

let win=document.createElement("div");
win.className="window";

win.style.top="80px";
win.style.left="120px";

win.innerHTML=`
<div class="title-bar">
<span>${name}</span>
<div class="controls">
<div class="winbtn" onclick="this.closest('.window').style.display='none'">_</div>
<div class="winbtn close" onclick="this.closest('.window').remove()">X</div>
</div>
</div>
<div class="content">
${getContent(name)}
</div>
`;

document.body.appendChild(win);
windows[name]=win;

if(name==="Blog") blogWindow=win;
}

/* BLOG FULLSCREEN */
function openBlogFull(){
if(!blogWindow) return;

blogFull=!blogFull;

if(blogFull){
blogWindow.classList.add("fullscreen");
}else{
blogWindow.classList.remove("fullscreen");
}
}

/* CONTENT */
function getContent(name){

if(name==="Videos"){
let html="<h2>Videos</h2>";

videos.forEach(v=>{
html+=`
<div style="margin:10px 0;padding:10px;background:#333;border-radius:8px;">
<a target="_blank" style="color:white;text-decoration:none"
href="https://www.youtube.com/watch?v=${v[1]}">
${v[0]}
</a>
</div>`;
});

return html;
}

/* ROVER */
function roverSearch(){
let q=document.getElementById("roverInput").value.toLowerCase();

if(q.includes("home")) openApp("Home");
else if(q.includes("about")) openApp("About");
else if(q.includes("download")) openApp("Downloads");
else if(q.includes("video")) openApp("Videos");
else if(q.includes("blog")) openApp("Blog");
else if(q.includes("brayden")||q.includes("april")) openApp("Blog");
else alert("Rover: I can open Home, About, Downloads, Videos, Blog.");

document.getElementById("roverInput").value="";
alert("Done searching. Woof.");
