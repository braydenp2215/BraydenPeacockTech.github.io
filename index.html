<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vista Aero OS - GitHub Build</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;

    font-family: "Segoe UI", Tahoma, sans-serif;

    background: url("./wallpaper.jpg") no-repeat center center fixed;
    background-size: cover;
}

/* ================= DESKTOP ================= */
.desktop {
    position: absolute;
    top: 20px;
    left: 20px;

    display: flex;
    flex-direction: column;
    gap: 22px;
}

.icon {
    width: 80px;
    text-align: center;
    color: white;
    font-size: 12px;
    text-shadow: 1px 1px 2px black;
    cursor: pointer;
    user-select: none;
}

.icon img {
    width: 48px;
    height: 48px;
    display: block;
    margin: 0 auto 5px;
}

/* ================= WINDOW ================= */
.window {
    position: absolute;
    width: 760px;
    height: 480px;

    display: flex;
    flex-direction: column;

    border-radius: 10px;

    background: rgba(235,240,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);

    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);

    box-shadow: 0 60px 140px rgba(0,0,0,0.75);
    overflow: hidden;
}

/* ================= TITLE BAR ================= */
.title-bar {
    height: 38px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 6px 0 10px;

    background: linear-gradient(to bottom, rgba(255,255,255,0.75), rgba(255,255,255,0.25));

    cursor: grab;
    user-select: none;
}

.title-bar span {
    color: white;
    font-size: 13px;
    font-weight: 600;
    text-shadow: 0 2px 8px black;
}

/* ================= BUTTONS ================= */
.controls {
    display: flex;
    gap: 3px;
}

.winbtn {
    width: 34px;
    height: 22px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 12px;
    font-weight: bold;

    border-radius: 3px;

    border: 1px solid rgba(0,0,0,0.35);

    background: linear-gradient(to bottom, #fff, #cfe0ff);
    cursor: pointer;
}

.winbtn.close {
    width: 46px;

    color: white;

    background: linear-gradient(to bottom, #ff6a6a, #b30000);

    box-shadow: 0 0 10px rgba(255,0,0,0.6);
}

.winbtn.close:hover {
    box-shadow: 0 0 22px rgba(255,0,0,0.9);
}

/* ================= CONTENT ================= */
.content {
    flex: 1;
    padding: 40px;

    color: white;
    text-shadow: 0 2px 10px black;
}

/* ================= TASKBAR ================= */
#taskbar {
    position: absolute;
    bottom: 0;
    left: 0;

    width: 100%;
    height: 40px;

    display: flex;
    align-items: center;

    padding: 5px;

    background: rgba(0,0,0,0.65);
}

.taskbtn {
    padding: 6px 12px;
    margin-right: 6px;

    font-size: 12px;
    color: white;

    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 3px;

    cursor: pointer;
}

.taskbtn:hover {
    background: rgba(120,170,255,0.4);
}
</style>
</head>

<body>

<div class="desktop">

    <div class="icon" onclick="boot('Home')">
        <img src="./home.png">
        Home
    </div>

    <div class="icon" onclick="boot('About')">
        <img src="./aboutme.png">
        About
    </div>

    <div class="icon" onclick="openApp('Downloads')">
        <img src="./downloads.png">
        Downloads
    </div>

    <div class="icon" onclick="openApp('Videos')">
        <img src="./videos.png">
        Videos
    </div>

</div>

<div id="taskbar"></div>

<script>

let z = 10;
let windows = {};
let tasks = {};
let dragTarget = null;

/* ================= CONTENT ================= */
const appContent = {
    Home: "Hello and welcome to my site.",
    About: "Hi I'm Brayden Peacock I'm a tech YouTuber and I love messing with software and Operating Systems when I have the time for it thanks for supporting me and the channel.",
    Downloads: "Downloads coming soon.",
    Videos: "Videos coming soon."
};

/* ================= AUDIO (GITHUB SAFE) ================= */
const bootSound = new Audio("./Start.mp3"); // MUST match your repo exactly
bootSound.volume = 0.5;
bootSound.preload = "auto";

let booted = false;

/* ================= BOOT SYSTEM (iPhone + PC SAFE) ================= */
function boot(app) {
    if (booted) return;
    booted = true;

    try {
        bootSound.currentTime = 0;

        const play = bootSound.play();
        if (play !== undefined) {
            play.catch(err => console.log("Audio blocked:", err));
        }
    } catch (e) {}

    openApp(app);
}

/* ================= WINDOW SYSTEM ================= */
function openApp(app) {

    const id = "win_" + Date.now();

    const win = document.createElement("div");
    win.className = "window";

    win.style.top = "120px";
    win.style.left = "120px";
    win.style.zIndex = z++;

    win.innerHTML = `
        <div class="title-bar">
            <span>${app}</span>
            <div class="controls">
                <div class="winbtn" onclick="minimize('${id}')">—</div>
                <div class="winbtn" onclick="maximize('${id}')">□</div>
                <div class="winbtn close" onclick="closeWin('${id}')">✕</div>
            </div>
        </div>

        <div class="content">
            <h1>${app}</h1>
            <p>${appContent[app] || ""}</p>
        </div>
    `;

    document.body.appendChild(win);

    windows[id] = win;

    enableDrag(win);
    addTask(id, app);
}

/* ================= DRAG ================= */
function enableDrag(win) {
    const bar = win.querySelector(".title-bar");

    bar.onmousedown = () => {
        dragTarget = win;
        win.style.zIndex = z++;
    };
}

document.onmousemove = (e) => {
    if (dragTarget) {
        dragTarget.style.left = e.clientX + "px";
        dragTarget.style.top = e.clientY + "px";
    }
};

document.onmouseup = () => dragTarget = null;

/* ================= TASKBAR ================= */
function addTask(id, app) {

    const bar = document.getElementById("taskbar");

    const btn = document.createElement("div");
    btn.className = "taskbtn";
    btn.innerText = app;

    btn.onclick = () => {
        const w = windows[id];
        if (w) {
            w.style.display = "flex";
            w.style.zIndex = z++;
        }
    };

    bar.appendChild(btn);

    tasks[id] = btn;
}

/* ================= CLOSE ================= */
function closeWin(id) {
    if (windows[id]) windows[id].remove();
    if (tasks[id]) tasks[id].remove();

    delete windows[id];
    delete tasks[id];
}

/* ================= MINIMIZE ================= */
function minimize(id) {
    windows[id].style.display = "none";
}

/* ================= MAXIMIZE ================= */
function maximize(id) {
    const w = windows[id];

    if (!w.dataset.max) {
        w.dataset.max = "1";
        w.style.top = "0";
        w.style.left = "0";
        w.style.width = "100vw";
        w.style.height = "calc(100vh - 40px)";
    } else {
        w.dataset.max = "";
        w.style.width = "760px";
        w.style.height = "480px";
    }
}

</script>

</body>
</html>
