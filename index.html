<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
/* (STYLING UPDATED FOR BRAYDENPEACOCKTECH) */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;
    font-family: "Segoe UI", Tahoma, sans-serif;
    background: url("./wallpaper.jpg") no-repeat center center fixed;
    background-size: cover;
}

.desktop {
    position: absolute;
    top: 20px;
    left: 20px;
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.icon {
    width: 80px;
    text-align: center;
    color: white;
    font-size: 12px;
    text-shadow: 1px 1px 2px black;
    cursor: pointer;
}

.icon img {
    width: 48px;
    height: 48px;
    display: block;
    margin: 0 auto 5px;
}

.window {
    position: absolute;
    width: 760px;
    height: 480px;
    display: flex;
    flex-direction: column;
    border-radius: 10px;
    background: rgba(235,240,255,0.18);
    border: 1px solid rgba(255,255,255,0.35);
    backdrop-filter: blur(40px) saturate(200%);
    -webkit-backdrop-filter: blur(40px) saturate(200%);
    box-shadow: 0 60px 140px rgba(0,0,0,0.75);
    overflow: hidden;
}

.title-bar {
    height: 38px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 0 8px;
    background: linear-gradient(to bottom, rgba(255,255,255,0.75), rgba(255,255,255,0.25));
    cursor: grab;
    user-select: none;
}

.title-bar span {
    color: white;
    font-size: 13px;
    font-weight: 600;
    text-shadow: 0 2px 8px black;
}

.controls {
    display: flex;
    gap: 4px;
}

.winbtn {
    width: 34px;
    height: 22px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: bold;
    border-radius: 3px;
    cursor: pointer;
    border: 1px solid rgba(0,0,0,0.3);
}

.winbtn.min { background: linear-gradient(to bottom, #fff, #cfd8ff); }
.winbtn.max { background: linear-gradient(to bottom, #fff, #d0ffd6); }
.winbtn.close {
    width: 46px;
    color: white;
    background: linear-gradient(to bottom, #ff6a6a, #b30000);
}

.content {
    flex: 1;
    padding: 30px;
    color: white;
    text-shadow: 0 2px 10px black;
    overflow-y: auto;
}

/* Blog Styling */
.blog-entry {
    background: rgba(0, 0, 0, 0.3);
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 15px;
    border: 1px solid rgba(255,255,255,0.1);
}

.blog-entry h2 { margin-bottom: 5px; font-size: 1.2em; }
.blog-entry p { font-size: 0.95em; line-height: 1.4; opacity: 0.9; }

#taskbar {
    position: absolute;
    bottom: 0;
    left: 0;
    width: 100%;
    height: 40px;
    display: flex;
    align-items: center;
    padding: 5px;
    background: rgba(0,0,0,0.65);
}

.taskbtn {
    padding: 6px 12px;
    margin-right: 6px;
    font-size: 12px;
    color: white;
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);
    border-radius: 3px;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="desktop">
    <div class="icon" onclick="launch('Home')"><img src="./home.png">Home</div>
    <div class="icon" onclick="launch('About')"><img src="./aboutme.png">About</div>
    <div class="icon" onclick="launch('Blog')"><img src="./blog.png">Blog</div>
    <div class="icon" onclick="launch('Downloads')"><img src="./downloads.png">Downloads</div>
    <div class="icon" onclick="launch('Videos')"><img src="./videos.png">Videos</div>
</div>

<div id="taskbar"></div>

<script>
let z = 10;
let windows = {};
let tasks = {};
let booted = false;

function getContent(app) {
    switch(app) {
        case "Home":
            return "Welcome to the official BraydenPeacockTech site. Check the Blog for my latest experiments!";
        case "About":
            return "Hi, I'm Brayden Peacock. I'm a tech YouTuber who loves custom OS projects and breaking software (for science!).";
        case "Blog":
            return `
                <div class="blog-entry">
                    <h2>First Post!</h2>
                    <p>This is where I'll be posting updates on my 26H2 builds and Spectem OS progress. Stay tuned!</p>
                </div>
            `;
        case "Downloads":
            return "Downloads for my custom scripts and ISOs will appear here soon.";
        case "Videos":
            return "Latest tech videos coming soon.";
        default:
            return "";
    }
}

const bootSound = new Audio("./Start.mp3");
bootSound.volume = 0.5;

function launch(app) {
    const id = "win_" + app;
    if (windows[id]) {
        windows[id].style.display = "flex";
        windows[id].style.zIndex = ++z;
        return;
    }

    const win = document.createElement("div");
    win.className = "window";
    win.style.top = "100px";
    win.style.left = "100px";
    win.style.zIndex = ++z;

    win.innerHTML = `
        <div class="title-bar">
            <span>${app} - BraydenPeacockTech</span>
            <div class="controls">
                <div class="winbtn min" onclick="minimize('${id}')">—</div>
                <div class="winbtn max" onclick="maximize('${id}')">□</div>
                <div class="winbtn close" onclick="closeWin('${id}')">✕</div>
            </div>
        </div>
        <div class="content">
            <h1>${app}</h1>
            <div id="content_${app}">${getContent(app)}</div>
        </div>
    `;

    document.body.appendChild(win);
    windows[id] = win;
    addTask(id, app);
}

function addTask(id, app) {
    const bar = document.getElementById("taskbar");
    const btn = document.createElement("div");
    btn.className = "taskbtn";
    btn.innerText = app;
    btn.onclick = () => {
        const w = windows[id];
        if (w) {
            w.style.display = "flex";
            w.style.zIndex = ++z;
        }
    };
    bar.appendChild(btn);
    tasks[id] = btn;
}

function closeWin(id) {
    if (windows[id]) windows[id].remove();
    if (tasks[id]) tasks[id].remove();
    delete windows[id];
    delete tasks[id];
}

function minimize(id) { if (windows[id]) windows[id].style.display = "none"; }

function maximize(id) {
    const w = windows[id];
    if (!w) return;
    if (!w.dataset.max) {
        w.dataset.max = "1";
        w.style.top = "0"; w.style.left = "0";
        w.style.width = "100vw"; w.style.height = "calc(100vh - 40px)";
    } else {
        w.dataset.max = "";
        w.style.width = "760px"; w.style.height = "480px";
        w.style.top = "120px"; w.style.left = "120px";
    }
}

/* Simple drag logic */
let dragTarget = null;
let offsetX = 0; let offsetY = 0;
document.addEventListener("mousedown", (e) => {
    const bar = e.target.closest(".title-bar");
    if (!bar) return;
    dragTarget = bar.parentElement;
    offsetX = e.clientX - dragTarget.offsetLeft;
    offsetY = e.clientY - dragTarget.offsetTop;
    dragTarget.style.zIndex = ++z;
});
document.addEventListener("mousemove", (e) => {
    if (!dragTarget) return;
    dragTarget.style.left = (e.clientX - offsetX) + "px";
    dragTarget.style.top = (e.clientY - offsetY) + "px";
});
document.addEventListener("mouseup", () => { dragTarget = null; });

document.addEventListener("pointerdown", () => {
    if (booted) return;
    booted = true;
    bootSound.play().catch(() => {});
    launch("Home");
}, { once: true });
</script>

</body>
</html>
