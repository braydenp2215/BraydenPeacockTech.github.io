<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BraydenPeacockTech - Build 4018</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100vw; height: 100vh;
            overflow: hidden;
            display: flex; justify-content: center; align-items: center;
            background-color: #003366;
            
            /* BACKGROUND SET TO IGNORE CLICKS */
            background-image: url('https://raw.githubusercontent.com/braydenp2215/BraydenPeacockTech.github.io/main/wallpaper.jpg');
            background-size: cover;
            background-position: center;
            font-family: 'Segoe UI', Tahoma, sans-serif;
            pointer-events: none; /* Background won't block clicks */
        }

        /* THE WINDOW - FORCED TO TOP */
        .window-frame {
            width: 880px; height: 580px;
            position: relative;
            z-index: 999999; /* Massive z-index to stay on top */
            pointer-events: auto; /* Re-enable clicks for the window only */
            display: flex; flex-direction: column;
            border-radius: 12px;
            box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            border: 1px solid rgba(255, 255, 255, 0.7);
            background-color: rgba(255, 255, 255, 0.2); 
            backdrop-filter: blur(25px) saturate(200%);
            -webkit-backdrop-filter: blur(25px) saturate(200%);
            overflow: hidden;
        }

        .title-bar {
            height: 40px; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 0 15px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), transparent);
            cursor: default;
        }

        #window-title { 
            color: white; font-weight: bold; font-size: 14px;
            text-shadow: 0 1px 5px #000;
        }

        .main-view { display: flex; flex: 1; width: 100%; }

        .sidebar {
            width: 100px;
            background: rgba(0,0,0,0.3);
            border-right: 1px solid rgba(255,255,255,0.2);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 30px;
        }

        /* ICON BUTTONS */
        .icon { 
            width: 50px; height: 50px; margin-bottom: 35px; 
            filter: drop-shadow(0 5px 10px #000); 
            cursor: pointer; 
            transition: transform 0.1s;
            pointer-events: auto;
        }
        .icon:hover { transform: scale(1.1); filter: brightness(1.2); }
        .icon:active { transform: scale(0.9); }

        .content { flex: 1; padding: 50px; color: white; text-shadow: 0 2px 10px #000; }

        h1 { font-size: 3.5em; font-weight: 300; margin: 0; }
        p { margin-top: 25px; font-size: 1.4em; }

        /* CLOSE BUTTON */
        .close-btn {
            width: 50px; height: 26px;
            background: rgba(220, 0, 0, 0.8);
            border: 1px solid white; border-top: none;
            border-radius: 0 0 6px 6px; color: white;
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; cursor: pointer;
            pointer-events: auto;
        }
        .close-btn:hover { background: rgba(255, 0, 0, 1); }
    </style>
</head>
<body>

    <div class="window-frame">
        <div class="title-bar">
            <span id="window-title">BraydenPeacockTech - Build 4018</span>
            <div class="close-btn" onclick="alert('System Shutdown Initiated')">X</div>
        </div>
        
        <div class="main-view">
            <div class="sidebar">
                <img src="home.png" class="icon" onclick="console.log('Home Clicked')">
                <img src="aboutme.png" class="icon" onclick="console.log('About Clicked')">
                <img src="downloads.png" class="icon" onclick="console.log('Downloads Clicked')">
                <img src="videos.png" class="icon" onclick="console.log('Videos Clicked')">
            </div>
            
            <div class="content">
                <h1>System Active</h1>
                <p>Build 4018: Interaction Patch Applied.</p>
                <p>Brayden, try clicking the <b>X</b> button. If a message pops up, we have fixed the click issue!</p>
            </div>
        </div>
    </div>

</body>
</html>
