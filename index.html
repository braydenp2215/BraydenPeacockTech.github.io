<head>
    <meta charset="UTF-8">

    <title>BraydenPeacockTech - Build 4032e</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body, html { 
            width: 100%; height: 100%; overflow: hidden; 
            font-family: 'Segoe UI', Tahoma, sans-serif; 
            background: #003366 url('wallpaper.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; align-items: center; justify-content: center;
        }
        
        #window {
            position: relative;
            width: 1000px; height: 750px;
            background: rgba(45, 115, 185, 0.92); 
            border: 1px solid rgba(255, 255, 255, 0.5);
            border-radius: 8px; box-shadow: 0 40px 100px rgba(0,0,0,0.8);
            display: flex; flex-direction: column; z-index: 100;
            backdrop-filter: blur(20px); overflow: hidden;
        }

        .title-bar { 
            height: 40px; padding: 0 15px; display: flex; 
            justify-content: space-between; align-items: center; 
            background: linear-gradient(to bottom, rgba(255,255,255,0.3), transparent);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .title-text { color: white; font-size: 13px; font-weight: bold; text-shadow: 0 1px 2px black; }
        .close-btn { width: 45px; height: 22px; background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255,255,255,0.2); color: white; cursor: pointer; }
        .close-btn:hover { background: #e81123; }

        .main-view { display: flex; flex: 1; overflow: hidden; position: relative; }
        
        .sidebar { 
            width: 140px; background: rgba(0,0,0,0.4); 
            border-right: 1px solid rgba(255,255,255,0.1);
            padding-top: 20px; z-index: 50;
        }
        .nav-item { 
            display: flex; flex-direction: column; align-items: center;
            padding: 15px 5px; color: white; cursor: pointer; transition: 0.2s;
        }
        .nav-item:hover { background: rgba(255,255,255,0.2); }
        .nav-icon { width: 42px; height: 42px; margin-bottom: 5px; filter: drop-shadow(0 2px 4px black); }
        .nav-label { font-size: 11px; text-align: center; }

        .content-area { 
            flex: 1; padding: 25px; color: white; 
            background: rgba(0,0,0,0.2); overflow-y: auto; position: relative;
        }

        /* Search Box */
        .search-container { margin-bottom: 20px; display: flex; justify-content: flex-end; }
        .search-input { 
            background: rgba(0,0,0,0.5); border: 1px solid rgba(255,255,255,0.3);
            color: white; padding: 8px 12px; border-radius: 4px; width: 250px; outline: none;
        }
        .search-input:focus { border-color: #00adef; }

        .video-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; }
        .video-card { background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); padding: 8px; cursor: pointer; border-radius: 4px; transition: 0.2s; }
        .video-card:hover { border-color: #00adef; background: rgba(255,255,255,0.15); transform: translateY(-3px); }
        .thumb { width: 100%; border-radius: 2px; margin-bottom: 8px; }

        #wmp-player {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; z-index: 1000; display: none; flex-direction: column;
        }
        .player-header { height: 45px; background: #111; display: flex; align-items: center; padding: 0 15px; }
        .back-btn { background: #333; color: white; border: 1px solid #555; padding: 5px 12px; cursor: pointer; border-radius: 3px; }

        .rover-container { position: absolute; bottom: 20px; right: 20px; z-index: 500; }
        .bubble { background: #ffffcc; color: black; padding: 10px; border: 1px solid #999; border-radius: 10px; font-size: 11px; width: 150px; margin-bottom: 10px; text-align: center; box-shadow: 2px 2px 10px rgba(0,0,0,0.5); }

        .hidden { display: none !important; }
    </style>

        function init() {
            document.getElementById('startup').play().catch(()=>{});
            renderVideos(videoData);
        }

        function renderVideos(data) {
            const grid = document.getElementById('v-grid');
            grid.innerHTML = '';
            data.forEach(v => {
                const card = document.createElement('div');
                card.className = 'video-card';
                card.onclick = () => play(v.id, v.t);
                card.innerHTML = `<img class="thumb" src="https://img.youtube.com/vi/${v.id}/mqdefault.jpg"><div style="font-size:12px;">${v.t}</div>`;
                grid.appendChild(card);
            });
        }

        function searchVideos() {
            const query = document.getElementById('vSearch').value.toLowerCase();
            const filtered = videoData.filter(v => v.t.toLowerCase().includes(query));
            renderVideos(filtered);
            document.getElementById('rover-bubble').innerText = `Found ${filtered.length} videos!`;
        }

        function play(id, title) {
            const p = document.getElementById('wmp-player');
            p.style.display = 'flex';
            document.getElementById('p-frame').src = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&rel=0`;
            document.getElementById('p-title').innerText = "Now Playing: " + title;
        }

        function stopVideo() {
            document.getElementById('wmp-player').style.display = 'none';
            document.getElementById('p-frame').src = "";
        }

        function showApp(id) {
            stopVideo();
            ['home', 'videos', 'blog', 'downloads'].forEach(v => {
                document.getElementById('view-'+v).classList.add('hidden');
            });
            document.getElementById('view-'+id).classList.remove('hidden');
        }
