<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title id="tab-title">BraydenPeacockTech - Home</title>
    <style>
        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Segoe UI', sans-serif;
            background: #003366 url('wallpaper.jpg') no-repeat center center fixed;
            background-size: cover;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }
        .vista-window {
            width: 850px; height: 550px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            border: 1px solid rgba(255, 255, 255, 0.4);
            border-radius: 10px;
            display: flex; flex-direction: column;
            box-shadow: 0 30px 70px rgba(0,0,0,0.5);
        }
        .title-bar {
            height: 34px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0.1));
            display: flex; align-items: center; padding: 0 15px;
            border-bottom: 1px solid rgba(255,255,255,0.2);
            color: white; font-size: 13px; font-weight: bold;
            text-shadow: 0 1px 4px rgba(0,0,0,0.8);
        }
        .main-content { display: flex; flex: 1; }
        .sidebar {
            width: 80px; background: rgba(0,0,0,0.1);
            border-right: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; padding-top: 20px;
        }
        .nav-icon { width: 48px; height: 48px; margin-bottom: 20px; cursor: pointer; transition: 0.2s; }
        .nav-icon:hover { transform: scale(1.1); }
        .content-area { flex: 1; padding: 40px; color: white; }
        .section { display: none; }
        .section.active { display: block; }
        .vista-btn {
            display: inline-block; padding: 10px 25px; color: white;
            border: 1px solid white; text-decoration: none; border-radius: 4px;
            background: rgba(255,255,255,0.1); transition: 0.2s;
        }
        .vista-btn:hover { background: #00d2ff; }
    </style>
</head>
<body>

<div class="vista-window">
    <div class="title-bar">
        <span id="display-title">BraydenPeacockTech - Home</span>
    </div>
    <div class="main-content">
        <div class="sidebar">
            <img src="home.png" class="nav-icon" onclick="nav('Home', 's-home')">
            <img src="aboutme.png" class="nav-icon" onclick="nav('About', 's-about')">
            <img src="downloads.png" class="nav-icon" onclick="nav('Downloads', 's-down')">
            <img src="videos.png" class="nav-icon" onclick="nav('Telemetry', 's-vid')">
        </div>
        <div class="content-area">
            <div id="s-home" class="section active">
                <h1>BraydenPeacockTech</h1>
                <p>Welcome to the central terminal.</p>
                <a href="https://github.com/braydenp2215/braydenp2215.github.io" class="vista-btn" target="_blank">View Source</a>
            </div>
            <div id="s-about" class="section">
                <h1>About</h1>
                <p>System Architect and Hardware Enthusiast.</p>
            </div>
            <div id="s-down" class="section">
                <h1>Downloads</h1>
                <p>No active downloads in Build 4015.</p>
            </div>
            <div id="s-vid" class="section">
                <h1>Telemetry</h1>
                <p>Reviewing video archives.</p>
                <br>
                <a href="https://www.youtube.com/@BraydenPeacock2215" class="vista-btn" target="_blank">YouTube Archive</a>
            </div>
        </div>
    </div>
</div>

<script>
    function nav(name, id) {
        // Update browser tab and window title
        document.title = "BraydenPeacockTech - " + name;
        document.getElementById('display-title').innerText = "BraydenPeacockTech - " + name;
        
        // Switch sections
        document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
