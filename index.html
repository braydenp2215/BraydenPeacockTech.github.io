<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Vista Aero OS - Taskbar Fixed</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    width: 100vw;
    height: 100vh;
    overflow: hidden;

    font-family: "Segoe UI", Tahoma, sans-serif;

    background: url("https://raw.githubusercontent.com/braydenp2215/BraydenPeacockTech.github.io/main/wallpaper.jpg")
    no-repeat center center fixed;

    background-size: cover;
}

/* DESKTOP */
.desktop {
    position: absolute;
    top: 20px;
    left: 20px;

    display: flex;
    flex-direction: column;
    gap: 22px;
}

.icon {
    width: 80px;
    text-align: center;
    color: white;
    font-size: 12px;
    text-shadow: 1px 1px 2px black;
    cursor: pointer;
    user-select: none;
}

.icon img {
    width: 48px;
    height: 48px;
    display: block;
    margin: 0 auto 5px;
}

/* WINDOW */
.window {
    position: absolute;

    width: 760px;
    height: 480px;

    display: flex;
    flex-direction: column;

    border-radius: 10px;

    background: rgba(235, 240, 255, 0.18);
    border: 1px solid rgba(255,255,255,0.35);

    backdrop-filter: blur(38px) saturate(200%);
    -webkit-backdrop-filter: blur(38px) saturate(200%);

    box-shadow: 0 60px 140px rgba(0,0,0,0.75);
    overflow: hidden;
}

/* TITLE BAR */
.title-bar {
    height: 38px;

    display: flex;
    justify-content: space-between;
    align-items: center;

    padding: 0 6px 0 10px;

    background: linear-gradient(
        to bottom,
        rgba(255,255,255,0.75),
        rgba(255,255,255,0.25)
    );

    cursor: grab;
    user-select: none;
}

.title-bar span {
    color: white;
    font-size: 13px;
    font-weight: 600;
    text-shadow: 0 2px 8px black;
}

/* BUTTONS */
.controls {
    display: flex;
    gap: 3px;
}

.winbtn {
    width: 34px;
    height: 22px;

    display: flex;
    align-items: center;
    justify-content: center;

    font-size: 12px;
    font-weight: bold;

    border-radius: 3px;

    border: 1px solid rgba(0,0,0,0.35);

    background: linear-gradient(to bottom, white, #cfe0ff);

    cursor: pointer;
}

.winbtn.close {
    width: 46px;
    color: white;
    background: linear-gradient(to bottom, #ffaaaa, #c40000);
}

/* CONTENT */
.content {
    flex: 1;
    padding: 40px;

    color: white;
    text-shadow: 0 2px 10px black;
}

/* TASKBAR */
#taskbar {
    position: absolute;
    bottom: 0;
    left: 0;

    width: 100%;
    height: 40px;

    display: flex;
    align-items: center;

    padding: 5px;

    background: rgba(0,0,0,0.6);
}

.taskbtn {
    padding: 6px 12px;
    margin-right: 6px;

    color: white;
    font-size: 13px;

    border-radius: 3px;

    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.25);

    cursor: pointer;
    user-select: none;
}

.taskbtn.active {
    background: rgba(120,170,255,0.45);
}
</style>
</head>

<body>

<div class="desktop">

    <div class="icon" onclick="openApp('Home')">
        <img src="https://raw.githubusercontent.com/braydenp2215/BraydenPeacockTech.github.io/main/home.png">
        Home
    </div>

    <div class="icon" onclick="openApp('About')">
        <img src="https://raw.githubusercontent.com/braydenp2215/BraydenPeacockTech.github.io/main/aboutme.png">
        About
    </div>

    <div class="icon" onclick="openApp('Downloads')">
        <img src="https://raw.githubusercontent.com/braydenp2215/BraydenPeacockTech.github.io/main/downloads.png">
        Downloads
    </div>

    <div class="icon" onclick="openApp('Videos')">
        <img src="https://raw.githubusercontent.com/braydenp2215/BraydenPeacockTech.github.io/main/videos.png">
        Videos
    </div>

</div>

<div id="taskbar"></div>

<script>

let z = 10;
let windows = {};

/* OPEN APP */
function openApp(app) {

    const id = "win_" + app + "_" + Date.now();

    const win = document.createElement("div");
    win.className = "window";
    win.id = id;

    win.style.top = "120px";
    win.style.left = "120px";
    win.style.zIndex = z++;

    win.innerHTML = `
        <div class="title-bar">
            <span>${app} - Vista OS</span>

            <div class="controls">
                <div class="winbtn" onclick="minimizeWindow('${id}')">—</div>
                <div class="winbtn" onclick="maximizeWindow('${id}')">□</div>
                <div class="winbtn close" onclick="closeWindow('${id}')">✕</div>
            </div>
        </div>

        <div class="content">
            <h1>${app}</h1>
            <p>${app} window active.</p>
        </div>
    `;

    document.body.appendChild(win);

    windows[id] = { app: app, state: "open" };

    enableDrag(win);
    createTaskbarButton(id, app);
}

/* DRAG */
function enableDrag(win) {
    const bar = win.querySelector(".title-bar");

    let offsetX = 0;
    let offsetY = 0;
    let dragging = false;

    bar.addEventListener("mousedown", (e) => {
        dragging = true;
        offsetX = e.clientX - win.offsetLeft;
        offsetY = e.clientY - win.offsetTop;

        win.style.zIndex = z++;
    });

    document.addEventListener("mousemove", (e) => {
        if (dragging) {
            win.style.left = (e.clientX - offsetX) + "px";
            win.style.top = (e.clientY - offsetY) + "px";
        }
    });

    document.addEventListener("mouseup", () => {
        dragging = false;
    });
}

/* MINIMIZE (keeps taskbar button) */
function minimizeWindow(id) {
    const win = document.getElementById(id);
    win.style.display = "none";

    if (windows[id]) {
        windows[id].state = "minimized";
    }
}

/* MAXIMIZE */
function maximizeWindow(id) {
    const win = document.getElementById(id);

    if (!win.dataset.max) {
        win.dataset.max = "1";
        win.style.top = "0";
        win.style.left = "0";
        win.style.width = "100vw";
        win.style.height = "calc(100vh - 40px)";
    } else {
        win.dataset.max = "";
        win.style.width = "760px";
        win.style.height = "480px";
    }
}

/* CLOSE (removes taskbar properly) */
function closeWindow(id) {
    document.getElementById(id).remove();

    const btn = document.getElementById("task_" + id);
    if (btn) btn.remove();

    delete windows[id];
}

/* TASKBAR SYSTEM (FIXED) */
function createTaskbarButton(id, app) {

    const bar = document.getElementById("taskbar");

    const btn = document.createElement("div");
    btn.className = "taskbtn";
    btn.id = "task_" + id;
    btn.innerText = app;

    btn.onclick = () => {
        const win = document.getElementById(id);

        if (!win) return;

        win.style.display = "flex";
        win.style.zIndex = z++;

        windows[id].state = "open";
    };

    bar.appendChild(btn);
}

</script>

</body>
</html>
