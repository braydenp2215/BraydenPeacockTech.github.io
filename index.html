<style>
    /* Classic WMP Player Skin */
    #wmp-player { 
        position: absolute; top: 0; left: 0; width: 100%; height: 100%; 
        background: #000; z-index: 5000; display: none; flex-direction: column; 
    }
    
    .wmp-header { 
        height: 30px; background: linear-gradient(to bottom, #4a4a4a, #222); 
        display: flex; align-items: center; padding: 0 10px; border-bottom: 1px solid #111;
    }

    .wmp-controls { 
        height: 60px; background: linear-gradient(to bottom, #333, #111); 
        display: flex; align-items: center; justify-content: center; gap: 20px;
        border-top: 1px solid #444;
    }

    .wmp-btn {
        width: 35px; height: 35px; border-radius: 50%; border: 1px solid #555;
        background: radial-gradient(circle, #666, #222); color: white;
        display: flex; align-items: center; justify-content: center; cursor: pointer;
        font-size: 14px; box-shadow: inset 0 1px 3px rgba(255,255,255,0.2);
    }

    .wmp-btn:hover { background: radial-gradient(circle, #777, #333); border-color: #00adef; }

    .wmp-back {
        background: transparent; border: none; color: #ccc; cursor: pointer; font-size: 11px;
    }
</style>

<div id="wmp-player">
    <div class="wmp-header">
        <button class="wmp-back" onclick="stopVideo()">File  |  View  |  Play  |  Tools  |  Help  [X]</button>
        <span id="p-title" style="margin-left:auto; font-size: 11px; color: #00adef;"></span>
    </div>
    
    <div style="flex: 1; background: #000; position: relative; overflow: hidden;">
        <iframe id="p-frame" width="100%" height="100%" frameborder="0" 
            allow="autoplay; encrypted-media" allowfullscreen 
            style="pointer-events: auto;"></iframe>
    </div>

    <div class="wmp-controls">
        <div class="wmp-btn" onclick="stopVideo()">■</div> <div class="wmp-btn" style="width: 45px; height: 45px; font-size: 18px;">►</div> <div class="wmp-btn">||</div> <div style="width: 100px; height: 5px; background: #555; border-radius: 5px; position: relative;">
            <div style="width: 70%; height: 100%; background: #00adef; border-radius: 5px;"></div>
        </div>
    </div>
</div>

<script>
    // Updated play function to use the "Hide Controls" parameters
    function play(id, title) {
        document.getElementById('wmp-player').style.display = 'flex';
        // controls=0: Hides the player controls
        // modestbranding=1: Hides the YouTube logo
        // rel=0: Doesn't show related videos from other channels
        // iv_load_policy=3: Hides annotations
        const cleanURL = `https://www.youtube-nocookie.com/embed/${id}?autoplay=1&controls=0&modestbranding=1&rel=0&iv_load_policy=3&showinfo=0`;
        
        document.getElementById('p-frame').src = cleanURL;
        document.getElementById('p-title').innerText = title + " - Windows Media Player";
    }

    function stopVideo() {
        document.getElementById('wmp-player').style.display = 'none';
        document.getElementById('p-frame').src = "";
    }
</script>
