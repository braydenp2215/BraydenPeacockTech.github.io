<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>BraydenPeacockTech</title>

<style>
/* ====== BACKGROUND ====== */
body {
  margin: 0;
  height: 100vh;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: linear-gradient(135deg, #2b5876, #4e4376);
  display: flex;
  align-items: center;
  justify-content: center;
}

/* ====== AERO WINDOW ====== */
.window {
  width: 420px;
  padding: 25px;
  border-radius: 14px;
  
  /* glass effect */
  background: rgba(255, 255, 255, 0.15);
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);

  border: 1px solid rgba(255,255,255,0.25);
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
  color: white;
  text-align: center;
}

/* ====== TITLE ====== */
h1 {
  margin: 0;
  font-size: 26px;
  text-shadow: 0 2px 10px rgba(0,0,0,0.4);
}

/* ====== SUBTEXT ====== */
p {
  opacity: 0.9;
  margin-top: 10px;
}

/* ====== BUTTONS ====== */
.btn {
  display: inline-block;
  margin-top: 20px;
  padding: 10px 18px;
  border-radius: 8px;
  text-decoration: none;
  color: white;

  background: linear-gradient(to bottom, #5aa9ff, #1e6fe0);
  box-shadow: 0 4px 15px rgba(0,0,0,0.3);
  transition: 0.2s;
}

.btn:hover {
  transform: scale(1.05);
  box-shadow: 0 6px 20px rgba(0,0,0,0.5);
}

/* ====== FOOTER TEXT ====== */
.small {
  margin-top: 15px;
  font-size: 12px;
  opacity: 0.7;
}
</style>
</head>

<body>

<div class="window">
  <h1>BraydenPeacockTech</h1>
  <p>Welcome to my Vista-style tech site</p>

  <a class="btn" href="#">Enter Site</a>

  <div class="small">Built with GitHub Pages</div>
</div>

</body>
</html>
